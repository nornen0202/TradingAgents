[channel]
name = "투자 유튜브 채널"
urls = [
  "https://www.youtube.com/@%EA%B2%BD%EC%A0%9C%EC%82%AC%EB%83%A5%EA%BE%BC/videos",
  "https://www.youtube.com/@%EA%B2%BD%EC%A0%9C%EC%82%AC%EB%83%A5%EA%BE%BC/shorts",
  "https://www.youtube.com/@sosumonkey/videos",
  "https://www.youtube.com/@815moneytalk/videos",
  "https://www.youtube.com/@supe-tv/videos",
  "https://www.youtube.com/@3protv/videos",
  "https://www.youtube.com/@plus_tv_official/videos",
]
lookback_hours = 24
timezone = "Asia/Seoul"
max_videos = 50
max_entries_per_url = 25
max_parallel_videos = 4

[llm]
provider = "codex"
deep_model = "gpt-5.5"
codex_reasoning_effort = "medium"
codex_summary = "none"
codex_personality = "none"
codex_request_timeout = 180.0
codex_max_retries = 2
codex_cleanup_threads = true
codex_preflight_mode = "workflow_once"

[verification]
mode = "external_full"
publish_unverified = true
max_claims_per_video = 12
strict_llm = true
research_enabled = true
max_research_queries = 10
max_evidence_items = 24
max_evidence_per_claim = 3
fetch_web_pages = true
max_web_pages = 4
max_transcript_chars_for_llm = 48000

[asr]
enabled = true
model = "auto"
device = "auto"
compute_type = "auto"
fallback_models = ["distil-large-v3", "small", "base"]
beam_size = 5
best_of = 5
temperature = "0.0,0.2,0.4"
condition_on_previous_text = false
repetition_penalty = 1.05
no_repeat_ngram_size = 3
word_timestamps = true
hallucination_silence_threshold = 1.0
vad_filter = true
vad_min_silence_ms = 500
vad_speech_pad_ms = 300
vad_threshold = 0.5
min_quality = "usable"
recheck_automatic = true
chunk_chars = 3200
max_chunks = 12
min_coverage_chunks = 5
hotwords = [
  "코스피",
  "코스닥",
  "나스닥",
  "FOMC",
  "CPI",
  "PCE",
  "영업이익",
  "컨센서스",
  "basis point",
  "삼성전자",
  "SK하이닉스",
  "엔비디아",
  "테슬라",
]

[storage]
archive_dir = "./.runtime/youtube-archive"
site_dir = "./site"

[site]
title = "YouTube 투자자용 검증 리포트"
max_runs = 30
max_videos_on_index = 50
