[run]
tickers = ["AAPL", "AMD", "AVGO", "CDNS", "COST", "ETN", "FANG", "GEV", "GOOGL", "GRID", "INTC", "LHX", "LLY", "LRCX", "MRVL", "MU", "NET", "NVDA", "ORCL", "PAVE", "SNPS", "SOXX", "TSLA", "TSM", "URI", "VRT"]
market = "US"
ticker_universe_mode = "config_only"
analysts = ["market", "social", "news", "fundamentals"]
output_language = "Korean"
trade_date_mode = "latest_available"
timezone = "Asia/Seoul"
max_debate_rounds = 1
max_risk_discuss_rounds = 1
latest_market_data_lookback_days = 14
continue_on_ticker_error = true
report_polisher_enabled = true

[llm]
provider = "codex"
quick_model = "gpt-5.5"
deep_model = "gpt-5.5"
output_model = "gpt-5.5"
codex_reasoning_effort = "medium"
codex_summary = "none"
codex_personality = "none"
codex_request_timeout = 180.0
codex_max_retries = 2
codex_cleanup_threads = true

[translation]
backend = "nllb_ct2"
model = "nllb-200-distilled-600m"
device = "auto"
compute_type = "auto"
max_chunk_chars = 1800
allow_llm_fallback = true
allow_large_model = false

[storage]
# For a self-hosted runner, it is better to override this to a persistent absolute path
# via the TRADINGAGENTS_ARCHIVE_DIR repository variable or by editing this file.
archive_dir = "./.runtime/tradingagents-archive"
site_dir = "./site"

[site]
title = "TradingAgents Daily Reports"
subtitle = "Self-hosted Codex automation for scheduled multi-ticker analysis"
max_runs_on_homepage = 30

[portfolio]
enabled = true
profile_path = "portfolio_profiles.toml"
profile_name = "us_kis_default"
continue_on_error = true
semantic_judge_enabled = true
action_judge_enabled = true
action_judge_top_n = 5
report_polisher_enabled = true

[execution]
enabled = true
checkpoints_kst = ["01:35", "03:35", "05:05", "23:35"]
max_data_age_seconds = 180
publish_badges = true
publish_debug = false
selective_rerun_enabled = true
llm_summary_model = "gpt-5.5"

[summary_image]
enabled = true
mode = "deterministic_svg"
publish_to_site = true
redact_account_values = false
image_model = "gpt-image-2"
image_size = "1024x1536"
image_quality = "medium"
request_timeout = 180.0

