[run]
tickers = ["AAPL", "AMD", "AVGO", "CDNS", "COST", "ETN", "FANG", "GEV", "GOOGL", "GRID", "INTC", "LHX", "LLY", "LRCX", "MRVL", "MU", "NET", "NVDA", "ORCL", "PAVE", "SNPS", "SOXX", "TSLA", "TSM", "URI", "VRT"]
market = "US"
ticker_universe_mode = "config_only"
analysts = ["market", "social", "news", "fundamentals"]
output_language = "Korean"
trade_date_mode = "latest_available"
timezone = "Asia/Seoul"
max_debate_rounds = 1
max_risk_discuss_rounds = 1
latest_market_data_lookback_days = 14
continue_on_ticker_error = true
report_polisher_enabled = true
max_runtime_minutes = 210
min_remaining_minutes_for_next_ticker = 25
parallel_ticker_execution = true
max_parallel_tickers = 2
per_ticker_timeout_minutes = 30
codex_circuit_breaker_enabled = true
max_consecutive_codex_failures = 3
fatal_error_patterns = ["usage limit", "model unavailable"]
daily_active_ticker_limit = 0
analysis_mode = "full"

[llm]
provider = "codex"
quick_model = "gpt-5.4-mini"
deep_model = "gpt-5.5"
output_model = "gpt-5.5"
codex_reasoning_effort = "medium"
codex_summary = "none"
codex_personality = "none"
codex_request_timeout = 180.0
codex_max_retries = 2
codex_cleanup_threads = true
codex_preflight_mode = "workflow_once"

[translation]
backend = "nllb_ct2"
model = "nllb-200-distilled-600m"
device = "auto"
compute_type = "auto"
max_chunk_chars = 1800
allow_llm_fallback = true
allow_large_model = false

[storage]
# For a self-hosted runner, it is better to override this to a persistent absolute path
# via the TRADINGAGENTS_ARCHIVE_DIR repository variable or by editing this file.
archive_dir = "./.runtime/tradingagents-archive"
site_dir = "./site"

[site]
title = "TradingAgents Daily Reports"
subtitle = "Self-hosted Codex automation for scheduled multi-ticker analysis"
max_runs_on_homepage = 30

[portfolio]
enabled = true
profile_path = "portfolio_profiles.toml"
profile_name = "us_kis_default"
continue_on_error = true
semantic_judge_enabled = true
action_judge_enabled = true
action_judge_top_n = 5
report_polisher_enabled = true

[portfolio_performance]
enabled = true
publish_to_site = true
public_sanitization = "mask_identifiers"
periods = ["1M", "3M", "6M", "YTD", "1Y", "ALL"]
kr_benchmarks = ["KOSPI", "KOSDAQ"]
us_benchmarks = ["SPY", "QQQ"]
price_provider = "yfinance"
price_history_path = ""
lookback_days = 800
fetch_kis_ledger = true
min_coverage_ratio = 0.8
broker_return_baseline_path = ""
broker_period_start = ""
broker_period_end = ""
prefer_broker_reported_performance = true
show_snapshot_performance_when_unreconciled = false

[etf_dca_benchmarks]
enabled = true
manual_cashflow_csv_path = ""
manual_cashflow_json_path = ""
price_history_path = ""
fx_history_path = ""
min_initial_seed_krw = 10000
reinvest_dividends = true
show_in_portfolio_report = true
generate_standalone_report = true

[etf_dca_benchmarks.instruments.kospi200]
display_name = "KOSPI200 ETF"
ticker = "069500.KS"
market = "KR"
currency = "KRW"

[etf_dca_benchmarks.instruments.kosdaq150]
display_name = "KOSDAQ150 ETF"
ticker = "229200.KS"
market = "KR"
currency = "KRW"

[etf_dca_benchmarks.instruments.sp500_krw]
display_name = "S&P500 KRW ETF"
ticker = "360750.KS"
market = "KR"
currency = "KRW"

[etf_dca_benchmarks.instruments.nasdaq100_krw]
display_name = "Nasdaq100 KRW ETF"
ticker = "133690.KS"
market = "KR"
currency = "KRW"

[etf_dca_benchmarks.portfolios.blended_default]
display_name = "혼합 벤치마크"
weights = { kospi200 = 0.35, kosdaq150 = 0.15, sp500_krw = 0.30, nasdaq100_krw = 0.20 }

[execution]
enabled = true
checkpoints_kst = ["01:35", "03:35", "05:05", "23:35"]
max_data_age_seconds = 180
publish_badges = true
publish_debug = false
selective_rerun_enabled = true
llm_summary_model = "gpt-5.4-mini"

[summary_image]
enabled = true
mode = "deterministic_svg"
publish_to_site = true
redact_account_values = false
image_model = "gpt-image-2"
image_size = "1024x1536"
image_quality = "medium"
request_timeout = 180.0

[external.prism]
enabled = true
mode = "advisory"
local_dashboard_json_path = ""
local_sqlite_db_path = ""
dashboard_json_url = ""
dashboard_base_url = "https://analysis.stocksimulation.kr"
timeout_seconds = 5
max_payload_bytes = 5000000
use_live_http = true
use_html_scraping = true
confidence_cap = 0.25
market = "US"
use_for_candidate_generation = true
use_for_performance_benchmark = true
use_for_ui_comparison = true

[scanner]
enabled = true
market = "US"
local_ohlcv_path = "C:/TradingAgentsData/scanner/us_ohlcv_snapshot.json"
max_candidates = 10
max_new_tickers_per_run = 5
include_prism_candidates = true
min_traded_value_krw = 10000000000
min_market_cap_krw = 500000000000
max_daily_change_pct = 20.0
min_volume_ratio_to_market_avg = 0.2
exclude_halted_or_low_liquidity = true

[performance]
enabled = true
store_path = ""
update_outcomes_on_run = true
price_provider = "yfinance"
price_history_path = ""
benchmark_ticker = "SPY"
outcome_horizons = [1, 3, 5, 10, 20, 60]
price_lookback_days = 120

