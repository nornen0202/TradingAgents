[run]
tickers = ["000660.KS", "005380.KS", "005930.KS", "009150.KS", "010950.KS", "011070.KS", "012450.KS", "034020.KS", "042700.KS", "058470.KQ", "064400.KS", "095340.KQ", "278470.KS", "353200.KS"]
market = "KR"
ticker_universe_mode = "config_only"
analysts = ["market", "social", "news", "fundamentals"]
output_language = "Korean"
trade_date_mode = "latest_available"
timezone = "Asia/Seoul"
max_debate_rounds = 1
max_risk_discuss_rounds = 1
latest_market_data_lookback_days = 14
continue_on_ticker_error = true
report_polisher_enabled = true
max_runtime_minutes = 210
min_remaining_minutes_for_next_ticker = 25

[llm]
provider = "codex"
quick_model = "gpt-5.4-mini"
deep_model = "gpt-5.5"
output_model = "gpt-5.5"
codex_reasoning_effort = "medium"
codex_summary = "none"
codex_personality = "none"
codex_request_timeout = 180.0
codex_max_retries = 2
codex_cleanup_threads = true

[translation]
backend = "nllb_ct2"
model = "nllb-200-distilled-600m"
device = "auto"
compute_type = "auto"
max_chunk_chars = 1800
allow_llm_fallback = true
allow_large_model = false

[storage]
# Keep run history in a dedicated archive for the KR schedule.
archive_dir = "./.runtime/tradingagents-archive"
site_dir = "./site"

[site]
title = "TradingAgents Daily Reports - KR"
subtitle = "Self-hosted Codex automation for scheduled KR-market multi-ticker analysis"
max_runs_on_homepage = 30

[portfolio]
enabled = true
profile_path = "portfolio_profiles.toml"
profile_name = "kr_kis_default"
continue_on_error = true
semantic_judge_enabled = true
action_judge_enabled = true
action_judge_top_n = 5
report_polisher_enabled = true

[portfolio_performance]
enabled = true
publish_to_site = true
public_sanitization = "mask_identifiers"
periods = ["1M", "3M", "6M", "YTD", "1Y", "ALL"]
kr_benchmarks = ["KOSPI", "KOSDAQ"]
us_benchmarks = ["SPY", "QQQ"]
price_provider = "yfinance"
price_history_path = ""
lookback_days = 800
fetch_kis_ledger = true

[execution]
enabled = true
checkpoints_kst = ["10:05", "11:05", "12:35", "14:35"]
max_data_age_seconds = 180
publish_badges = true
publish_debug = false
selective_rerun_enabled = true
llm_summary_model = "gpt-5.4-mini"

[summary_image]
enabled = true
mode = "deterministic_svg"
publish_to_site = true
redact_account_values = false
image_model = "gpt-image-2"
image_size = "1024x1536"
image_quality = "medium"
request_timeout = 180.0

[external.prism]
enabled = true
mode = "advisory"
local_dashboard_json_path = ""
local_sqlite_db_path = ""
dashboard_json_url = ""
dashboard_base_url = "https://analysis.stocksimulation.kr"
timeout_seconds = 5
max_payload_bytes = 5000000
use_live_http = true
use_html_scraping = true
confidence_cap = 0.25
market = "KR"
use_for_candidate_generation = true
use_for_performance_benchmark = true
use_for_ui_comparison = true

[scanner]
enabled = true
market = "KR"
local_ohlcv_path = "C:/TradingAgentsData/scanner/kr_ohlcv_snapshot.json"
max_candidates = 10
max_new_tickers_per_run = 5
include_prism_candidates = true
min_traded_value_krw = 10000000000
min_market_cap_krw = 500000000000
max_daily_change_pct = 20.0
min_volume_ratio_to_market_avg = 0.2
exclude_halted_or_low_liquidity = true

[performance]
enabled = true
store_path = ""
update_outcomes_on_run = true
price_provider = "yfinance"
price_history_path = ""
benchmark_ticker = "^KS11"
outcome_horizons = [1, 3, 5, 10, 20, 60]
price_lookback_days = 120

[notes]
market_country = "KR"
timezone = "Asia/Seoul"
vendor_priority_get_company_news = "naver,yfinance,alpha_vantage"
vendor_priority_get_disclosures = "opendart"
vendor_priority_get_macro_news = "ecos,alpha_vantage,yfinance"
vendor_priority_get_social_sentiment = "naver,yfinance"

