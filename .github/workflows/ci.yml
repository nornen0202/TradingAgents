name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install "pytest>=8.4,<10" "ruff>=0.15,<0.16" "websockets>=15,<17"

      - name: Run high-signal static checks
        run: ruff check . --select E9,F63,F7,F82

      - name: Run unit tests
        run: python -m pytest -q

      - name: Verify mobile layout at 360, 390, and 430px
        run: python .github/scripts/mobile_layout_regression.py
