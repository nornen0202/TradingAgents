name: Account Portfolio Report Verify

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "KIS account report profile to verify: all / kr / us"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - kr
          - us

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: account-portfolio-report-verify
  cancel-in-progress: true

jobs:
  verify_kr:
    if: ${{ github.event.inputs.profile == 'all' || github.event.inputs.profile == 'kr' }}
    runs-on: [self-hosted, Windows]
    outputs:
      pages_snapshot_generated_epoch_ms: ${{ steps.stamp_pages_snapshot.outputs.generated_epoch_ms }}
    timeout-minutes: 25
    defaults:
      run:
        shell: python {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      TRADINGAGENTS_PRISM_TELEGRAM_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_PRISM_TELEGRAM_ARCHIVE_DIR }}
      TRADINGAGENTS_YOUTUBE_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_YOUTUBE_ARCHIVE_DIR }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_PRODUCT_CODE: ${{ secrets.KIS_PRODUCT_CODE }}
      KIS_Developers_APP_KEY: ${{ secrets.KIS_Developers_APP_KEY }}
      KIS_Developers_APP_SECRET: ${{ secrets.KIS_Developers_APP_SECRET }}
      KIS_Developers_ACCOUNT_NO: ${{ secrets.KIS_Developers_ACCOUNT_NO }}
      KIS_Developers_PRODUCT_CODE: ${{ secrets.KIS_Developers_PRODUCT_CODE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install TradingAgents
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", "."])

      - name: Materialize KIS API keys
        run: |
          import json
          import os
          from pathlib import Path

          alias_groups = {
              "KIS_APP_KEY": ("KIS_APP_KEY", "KIS_Developers_APP_KEY"),
              "KIS_APP_SECRET": ("KIS_APP_SECRET", "KIS_Developers_APP_SECRET"),
              "KIS_ACCOUNT_NO": ("KIS_ACCOUNT_NO", "KIS_Developers_ACCOUNT_NO"),
              "KIS_PRODUCT_CODE": ("KIS_PRODUCT_CODE", "KIS_Developers_PRODUCT_CODE"),
          }
          payload = {}
          missing = []
          for canonical_name, candidates in alias_groups.items():
              for candidate in candidates:
                  value = os.environ.get(candidate)
                  if value and value.strip():
                      payload[canonical_name] = value
                      payload[candidate] = value
                      break
              if canonical_name in {"KIS_APP_KEY", "KIS_APP_SECRET"} and canonical_name not in payload:
                  missing.append(canonical_name)
          if missing:
              raise SystemExit(f"Missing required KIS credentials: {', '.join(missing)}")
          runtime_path = Path(os.environ["RUNNER_TEMP"]) / "tradingagents-kis-api-keys.json"
          runtime_path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"TRADINGAGENTS_API_KEYS_PATH={runtime_path}\n")
          print("Materialized KIS credentials for portfolio-only account verification.")

      - name: KIS KR account preflight
        run: |
          from tradingagents.portfolio.kis import KisClient
          from tradingagents.portfolio.profiles import load_portfolio_profile

          profile = load_portfolio_profile("config/portfolio_profiles.toml", "kr_kis_default")
          if not profile.account_no:
              raise SystemExit("KIS account number is not configured for kr_kis_default.")
          client = KisClient.from_api_keys()
          token = client.issue_access_token()
          positions, summary = client.fetch_balance(account_no=profile.account_no, product_code=profile.product_code or "01")
          print(
              "KIS KR account preflight:",
              {
                  "environment": client.environment,
                  "token_issued": bool(token),
                  "positions_count": len(positions),
                  "summary_field_count": len(summary or {}),
              },
          )

      - name: Run KR portfolio-only account report
        run: |
          import os
          import subprocess
          import sys

          args = [
              sys.executable,
              "-m",
              "tradingagents.scheduled",
              "--config",
              "config/scheduled_analysis_korea.toml",
              "--run-mode",
              "portfolio_only",
              "--site-dir",
              os.environ["TRADINGAGENTS_SITE_DIR"],
              "--label",
              "github-actions-portfolio-kr",
          ]
          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]
          subprocess.check_call(args)

      - name: Verify KR public account performance report
        run: |
          import subprocess
          import sys

          subprocess.check_call(
              [
                  sys.executable,
                  ".github/scripts/verify_account_performance_site.py",
                  "--site-dir",
                  "site",
                  "--market",
                  "kr",
                  "--run-label",
                  "github-actions-portfolio-kr",
              ]
          )

      - name: Stamp KR rollback-resistant Pages snapshot
        id: stamp_pages_snapshot
        run: |
          import subprocess
          import sys

          subprocess.check_call(
              [
                  sys.executable,
                  ".github/scripts/pages_snapshot.py",
                  "stamp",
                  "--site-dir",
                  "site",
                  "--repository",
                  "${{ github.repository }}",
                  "--workflow",
                  "${{ github.workflow }}",
                  "--run-id",
                  "${{ github.run_id }}",
                  "--run-attempt",
                  "${{ github.run_attempt }}",
                  "--commit-sha",
                  "${{ github.sha }}",
                  "--require-strategy-payload",
              ]
          )

      - name: Upload KR generated site
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: account-performance-kr-site-${{ github.run_id }}
          path: site

      - name: Upload KR GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: account-performance-pages-kr
          path: site

  verify_us:
    needs:
      - verify_kr
    if: ${{ always() && (github.event.inputs.profile == 'us' || (github.event.inputs.profile == 'all' && needs.verify_kr.result == 'success')) }}
    runs-on: [self-hosted, Windows]
    outputs:
      pages_snapshot_generated_epoch_ms: ${{ steps.stamp_pages_snapshot.outputs.generated_epoch_ms }}
    timeout-minutes: 25
    defaults:
      run:
        shell: python {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      TRADINGAGENTS_PRISM_TELEGRAM_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_PRISM_TELEGRAM_ARCHIVE_DIR }}
      TRADINGAGENTS_YOUTUBE_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_YOUTUBE_ARCHIVE_DIR }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_PRODUCT_CODE: ${{ secrets.KIS_PRODUCT_CODE }}
      KIS_Developers_APP_KEY: ${{ secrets.KIS_Developers_APP_KEY }}
      KIS_Developers_APP_SECRET: ${{ secrets.KIS_Developers_APP_SECRET }}
      KIS_Developers_ACCOUNT_NO: ${{ secrets.KIS_Developers_ACCOUNT_NO }}
      KIS_Developers_PRODUCT_CODE: ${{ secrets.KIS_Developers_PRODUCT_CODE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install TradingAgents
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", "."])

      - name: Materialize KIS API keys
        run: |
          import json
          import os
          from pathlib import Path

          alias_groups = {
              "KIS_APP_KEY": ("KIS_APP_KEY", "KIS_Developers_APP_KEY"),
              "KIS_APP_SECRET": ("KIS_APP_SECRET", "KIS_Developers_APP_SECRET"),
              "KIS_ACCOUNT_NO": ("KIS_ACCOUNT_NO", "KIS_Developers_ACCOUNT_NO"),
              "KIS_PRODUCT_CODE": ("KIS_PRODUCT_CODE", "KIS_Developers_PRODUCT_CODE"),
          }
          payload = {}
          missing = []
          for canonical_name, candidates in alias_groups.items():
              for candidate in candidates:
                  value = os.environ.get(candidate)
                  if value and value.strip():
                      payload[canonical_name] = value
                      payload[candidate] = value
                      break
              if canonical_name in {"KIS_APP_KEY", "KIS_APP_SECRET"} and canonical_name not in payload:
                  missing.append(canonical_name)
          if missing:
              raise SystemExit(f"Missing required KIS credentials: {', '.join(missing)}")
          runtime_path = Path(os.environ["RUNNER_TEMP"]) / "tradingagents-kis-api-keys.json"
          runtime_path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"TRADINGAGENTS_API_KEYS_PATH={runtime_path}\n")
          print("Materialized KIS credentials for portfolio-only account verification.")

      - name: KIS US account preflight
        run: |
          from tradingagents.portfolio.kis import KisClient
          from tradingagents.portfolio.profiles import load_portfolio_profile

          profile = load_portfolio_profile("config/portfolio_profiles.toml", "us_kis_default")
          if not profile.account_no:
              raise SystemExit("KIS account number is not configured for us_kis_default.")
          client = KisClient.from_api_keys()
          token = client.issue_access_token()
          positions, summary = client.fetch_overseas_present_balance(
              account_no=profile.account_no,
              product_code=profile.product_code or "01",
          )
          print(
              "KIS US account preflight:",
              {
                  "environment": client.environment,
                  "token_issued": bool(token),
                  "positions_count": len(positions),
                  "summary_field_count": len(summary or {}),
              },
          )

      - name: Run US portfolio-only account report
        run: |
          import os
          import subprocess
          import sys

          args = [
              sys.executable,
              "-m",
              "tradingagents.scheduled",
              "--config",
              "config/scheduled_analysis.toml",
              "--run-mode",
              "portfolio_only",
              "--site-dir",
              os.environ["TRADINGAGENTS_SITE_DIR"],
              "--label",
              "github-actions-portfolio-us",
          ]
          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]
          subprocess.check_call(args)

      - name: Verify US public account performance report
        run: |
          import subprocess
          import sys

          subprocess.check_call(
              [
                  sys.executable,
                  ".github/scripts/verify_account_performance_site.py",
                  "--site-dir",
                  "site",
                  "--market",
                  "us",
                  "--run-label",
                  "github-actions-portfolio-us",
              ]
          )

      - name: Stamp US rollback-resistant Pages snapshot
        id: stamp_pages_snapshot
        run: |
          import subprocess
          import sys

          subprocess.check_call(
              [
                  sys.executable,
                  ".github/scripts/pages_snapshot.py",
                  "stamp",
                  "--site-dir",
                  "site",
                  "--repository",
                  "${{ github.repository }}",
                  "--workflow",
                  "${{ github.workflow }}",
                  "--run-id",
                  "${{ github.run_id }}",
                  "--run-attempt",
                  "${{ github.run_attempt }}",
                  "--commit-sha",
                  "${{ github.sha }}",
                  "--require-strategy-payload",
              ]
          )

      - name: Upload US generated site
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: account-performance-us-site-${{ github.run_id }}
          path: site

      - name: Upload US GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: account-performance-pages-us
          path: site

  deploy:
    needs:
      - verify_kr
      - verify_us
    if: ${{ always() && github.ref == 'refs/heads/main' && !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') && ((github.event.inputs.profile == 'all' && needs.verify_us.result == 'success') || (github.event.inputs.profile == 'us' && needs.verify_us.result == 'success') || (github.event.inputs.profile == 'kr' && needs.verify_kr.result == 'success')) }}
    runs-on: ubuntu-latest
    concurrency:
      group: tradingagents-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out deployment guard
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Select final account Pages artifact
        id: select_account_snapshot
        shell: python {0}
        env:
          REQUESTED_PROFILE: ${{ github.event.inputs.profile }}
          KR_SNAPSHOT_EPOCH_MS: ${{ needs.verify_kr.outputs.pages_snapshot_generated_epoch_ms }}
          US_SNAPSHOT_EPOCH_MS: ${{ needs.verify_us.outputs.pages_snapshot_generated_epoch_ms }}
        run: |
          import os
          from pathlib import Path

          profile = os.environ.get("REQUESTED_PROFILE", "").strip().lower()
          if profile == "kr":
              artifact = "account-performance-pages-kr"
              epoch = os.environ.get("KR_SNAPSHOT_EPOCH_MS", "").strip()
          elif profile in {"us", "all"}:
              # The US job runs after KR for profile=all and rebuilds the site
              # from the shared archive, so it is the only complete final artifact.
              artifact = "account-performance-pages-us"
              epoch = os.environ.get("US_SNAPSHOT_EPOCH_MS", "").strip()
          else:
              raise SystemExit(f"Unsupported account profile: {profile!r}")
          if not epoch.isdigit() or int(epoch) <= 0:
              raise SystemExit(f"Selected account snapshot has no valid generation time: {profile}")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8", newline="\n") as handle:
              handle.write(f"artifact_name={artifact}\n")
              handle.write(f"generated_epoch_ms={epoch}\n")

      - name: Refuse stale Pages snapshot rollback
        id: pages_guard
        env:
          PAGES_PUBLIC_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: >-
          python .github/scripts/pages_snapshot.py guard
          --candidate-generated-epoch-ms "${{ steps.select_account_snapshot.outputs.generated_epoch_ms }}"
          --candidate-run-id "${{ github.run_id }}"
          --candidate-run-attempt "${{ github.run_attempt }}"
          --public-base-url "$PAGES_PUBLIC_BASE_URL"

      - name: Deploy account performance site to GitHub Pages
        id: deployment
        if: ${{ steps.pages_guard.outputs.should_deploy == 'true' }}
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: ${{ steps.select_account_snapshot.outputs.artifact_name }}
