name: Daily YouTube Verified Reports

on:
  schedule:
    # Target: 20:00 KST every day, including weekends. Avoid minute 0 because
    # GitHub may delay or drop scheduled workflows during the start-of-hour
    # load spike.
    - cron: '17 11 * * *'
    # Backup trigger in the same KST hour. The schedule_gate job skips it when
    # the primary schedule for the evening has already succeeded or is running.
    - cron: '47 11 * * *'
    # Second-wave backups for GitHub schedule drops. These still run every day,
    # and schedule_gate prevents duplicate reports inside the same evening.
    - cron: '17 12 * * *'
    - cron: '47 12 * * *'
    # Late recovery probes. These protect against evenings where GitHub drops
    # every direct YouTube schedule before the watchdog sees the missed target.
    - cron: '17 13 * * *'
    - cron: '47 13 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Lookback window in hours"
        required: false
        default: "24"
        type: string
      channel_urls:
        description: "Optional comma-separated YouTube channel tab URLs"
        required: false
        type: string
      publish:
        description: "Publish /youtube pages into the Pages artifact"
        required: false
        default: true
        type: boolean
      max_videos:
        description: "Maximum videos to process"
        required: false
        default: "50"
        type: string
      max_entries_per_url:
        description: "Maximum channel tab entries to inspect per URL"
        required: false
        default: "25"
        type: string
      max_parallel_videos:
        description: "Maximum videos to analyze concurrently"
        required: false
        default: "4"
        type: string

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  schedule_gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Decide scheduled execution
        id: gate
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: daily-youtube-reports.yml
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          MANUAL_DEFAULT_PROFILE: ""
          SCHEDULE_GATE_TARGETS_JSON: >-
            {
              "17 11 * * *": {"profile": "youtube", "window_start": "19:00", "target_jobs": ["build_youtube_pages"]},
              "47 11 * * *": {"profile": "youtube", "window_start": "19:00", "target_jobs": ["build_youtube_pages"]},
              "17 12 * * *": {"profile": "youtube", "window_start": "19:00", "target_jobs": ["build_youtube_pages"]},
              "47 12 * * *": {"profile": "youtube", "window_start": "19:00", "target_jobs": ["build_youtube_pages"]},
              "17 13 * * *": {"profile": "youtube", "window_start": "19:00", "target_jobs": ["build_youtube_pages"]},
              "47 13 * * *": {"profile": "youtube", "window_start": "19:00", "target_jobs": ["build_youtube_pages"]}
            }
        run: python .github/scripts/scheduled_workflow_gate.py

  build_youtube_pages:
    needs: schedule_gate
    if: ${{ github.ref == 'refs/heads/main' && needs.schedule_gate.outputs.should_run == 'true' }}
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        shell: python {0}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_CODEX_ALLOW_MODEL_FALLBACK: "0"
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      TRADINGAGENTS_YOUTUBE_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_YOUTUBE_ARCHIVE_DIR }}
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      YOUTUBE_COOKIES_TXT: ${{ secrets.YOUTUBE_COOKIES_TXT }}
      YOUTUBE_COOKIES_TXT_B64: ${{ secrets.YOUTUBE_COOKIES_TXT_B64 }}
      YOUTUBE_PROXY: ${{ secrets.YOUTUBE_PROXY }}
      YOUTUBE_VISITOR_DATA: ${{ secrets.YOUTUBE_VISITOR_DATA }}
      YOUTUBE_PO_TOKEN: ${{ secrets.YOUTUBE_PO_TOKEN }}
      YOUTUBE_SUBS_PO_TOKEN: ${{ secrets.YOUTUBE_SUBS_PO_TOKEN }}
      YOUTUBE_GVS_PO_TOKEN: ${{ secrets.YOUTUBE_GVS_PO_TOKEN }}
      YOUTUBE_PLAYER_CLIENTS: ${{ vars.YOUTUBE_PLAYER_CLIENTS }}
      TRADINGAGENTS_YTDLP_REMOTE_COMPONENTS: "ejs:github"
      TRADINGAGENTS_YOUTUBE_ASR_FALLBACK: "1"
      TRADINGAGENTS_YOUTUBE_ASR_MODEL: "auto"
      TRADINGAGENTS_YOUTUBE_ASR_DEVICE: "auto"
      TRADINGAGENTS_YOUTUBE_ASR_COMPUTE_TYPE: "auto"
      TRADINGAGENTS_YOUTUBE_ASR_FALLBACK_MODELS: "distil-large-v3,small,base"
      TRADINGAGENTS_YOUTUBE_ASR_BEAM_SIZE: "5"
      TRADINGAGENTS_YOUTUBE_ASR_BEST_OF: "5"
      TRADINGAGENTS_YOUTUBE_ASR_TEMPERATURE: "0.0,0.2,0.4"
      TRADINGAGENTS_YOUTUBE_ASR_CONDITION_ON_PREVIOUS_TEXT: "0"
      TRADINGAGENTS_YOUTUBE_ASR_REPETITION_PENALTY: "1.05"
      TRADINGAGENTS_YOUTUBE_ASR_NO_REPEAT_NGRAM_SIZE: "3"
      TRADINGAGENTS_YOUTUBE_ASR_WORD_TIMESTAMPS: "1"
      TRADINGAGENTS_YOUTUBE_ASR_HALLUCINATION_SILENCE_THRESHOLD: "1.0"
      TRADINGAGENTS_YOUTUBE_ASR_MIN_QUALITY: "usable"
      TRADINGAGENTS_YOUTUBE_ASR_RECHECK_AUTOMATIC: "1"
      TRADINGAGENTS_YOUTUBE_TRANSCRIPT_CHUNK_CHARS: "3200"
      TRADINGAGENTS_YOUTUBE_TRANSCRIPT_MAX_CHUNKS: "12"
      TRADINGAGENTS_YOUTUBE_TRANSCRIPT_MIN_COVERAGE_CHUNKS: "5"
      TRADINGAGENTS_YOUTUBE_MIN_TRANSCRIPT_CHARS: "120"
      TRADINGAGENTS_YOUTUBE_BGUTIL_VERSION: ${{ vars.YOUTUBE_BGUTIL_VERSION }}
      HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js for bgutil PO token provider
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare Codex workspace
        run: |
          import os
          import shutil
          from pathlib import Path

          runner_temp = Path(os.environ["RUNNER_TEMP"]).resolve()
          workspace = (runner_temp / "tradingagents-youtube-codex").resolve()
          if os.path.commonpath([str(workspace), str(runner_temp)]) != str(runner_temp):
              raise SystemExit(f"Refusing to use Codex workspace outside RUNNER_TEMP: {workspace}")
          if workspace.exists():
              shutil.rmtree(workspace, ignore_errors=True)
          workspace.mkdir(parents=True, exist_ok=True)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"TRADINGAGENTS_CODEX_WORKSPACE_DIR={workspace}\n")
          print(f"Using Codex workspace: {workspace}")

      - name: Install TradingAgents
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", "."])

      - name: Start bgutil PO token provider
        run: |
          import os
          import shutil
          import subprocess
          import sys
          import time
          import urllib.request
          from pathlib import Path

          base_url = os.environ.get("TRADINGAGENTS_YOUTUBE_BGUTIL_BASE_URL", "http://127.0.0.1:4416").strip()
          if not base_url:
              raise SystemExit(0)

          def ping_provider() -> bool:
              try:
                  with urllib.request.urlopen(f"{base_url.rstrip('/')}/ping", timeout=2) as response:
                      return 200 <= response.status < 300
              except Exception:
                  return False

          if ping_provider():
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                  handle.write(f"TRADINGAGENTS_YOUTUBE_BGUTIL_BASE_URL={base_url}\n")
              print(f"bgutil provider already reachable at {base_url}")
              raise SystemExit(0)

          node = shutil.which("node")
          git = shutil.which("git")
          npm = shutil.which("npm")
          npx = shutil.which("npx")
          if not node or not git or not npm or not npx:
              print("::warning::bgutil provider setup skipped because node/git/npm/npx is unavailable.")
              raise SystemExit(0)

          version = os.environ.get("TRADINGAGENTS_YOUTUBE_BGUTIL_VERSION", "").strip() or "1.3.1"
          provider_root = Path(os.environ["RUNNER_TEMP"]) / f"bgutil-ytdlp-pot-provider-{version}"
          server_dir = provider_root / "server"
          log_path = Path(os.environ["RUNNER_TEMP"]) / "bgutil-ytdlp-pot-provider.log"
          try:
              if not (server_dir / "build" / "main.js").exists():
                  if provider_root.exists():
                      shutil.rmtree(provider_root, ignore_errors=True)
                  print(f"Cloning bgutil-ytdlp-pot-provider {version}...")
                  subprocess.check_call([
                      git,
                      "clone",
                      "--depth",
                      "1",
                      "--single-branch",
                      "--branch",
                      version,
                      "https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git",
                      str(provider_root),
                  ])
                  subprocess.check_call([npm, "ci"], cwd=server_dir)
                  subprocess.check_call([npx, "tsc"], cwd=server_dir)

              log_file = log_path.open("a", encoding="utf-8")
              creationflags = getattr(subprocess, "CREATE_NO_WINDOW", 0)
              process = subprocess.Popen(
                  [node, str(server_dir / "build" / "main.js")],
                  cwd=server_dir,
                  stdout=log_file,
                  stderr=subprocess.STDOUT,
                  creationflags=creationflags,
              )
              for _ in range(30):
                  if process.poll() is not None:
                      break
                  if ping_provider():
                      with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                          handle.write(f"TRADINGAGENTS_YOUTUBE_BGUTIL_BASE_URL={base_url}\n")
                          handle.write(f"TRADINGAGENTS_YOUTUBE_BGUTIL_SERVER_HOME={server_dir}\n")
                      print(f"bgutil provider started at {base_url}; log={log_path}")
                      raise SystemExit(0)
                  time.sleep(1)
          except SystemExit:
              raise
          except Exception as exc:
              print(f"::warning::bgutil provider setup failed; continuing with ASR fallback. error={exc!r}; log={log_path}")
              raise SystemExit(0)
          print(f"::warning::bgutil provider did not become reachable; continuing with ASR fallback. log={log_path}")

      - name: Probe YouTube ASR and PO token runtime
        run: |
          import os
          import subprocess
          import sys
          from pathlib import Path

          try:
              result = subprocess.run(["nvidia-smi", "--query-gpu=name,memory.total", "--format=csv,noheader"], text=True, capture_output=True, check=False)
              print("nvidia-smi:", result.stdout.strip() or result.stderr.strip() or f"exit={result.returncode}")
          except OSError:
              print("nvidia-smi: unavailable")
          try:
              import ctranslate2
              print("ctranslate2 cuda devices:", ctranslate2.get_cuda_device_count())
          except Exception as exc:
              print("ctranslate2 probe failed:", exc)
          from tradingagents.dataflows import youtube_video as youtube_runtime

          print("ASR device:", youtube_runtime._youtube_asr_device())
          print("ASR model:", youtube_runtime._youtube_asr_model(device=youtube_runtime._youtube_asr_device()))
          print("ASR compute type:", youtube_runtime._youtube_asr_compute_type(device=youtube_runtime._youtube_asr_device()))
          options = youtube_runtime._youtube_dl_options(skip_download=True, quiet=True)
          print("yt-dlp plugin dirs:", options.get("plugin_dirs"))
          print("yt-dlp js runtimes:", options.get("js_runtimes"))
          print("yt-dlp remote components:", options.get("remote_components"))
          print("yt-dlp ffmpeg location:", options.get("ffmpeg_location"))
          plugin_zip = Path(os.environ.get("APPDATA", "")) / "yt-dlp" / "plugins" / "bgutil-ytdlp-pot-provider.zip"
          print("bgutil PO token provider zip:", plugin_zip if plugin_zip.exists() else "not found")
          server_home = Path(os.environ.get("USERPROFILE", "")) / "bgutil-ytdlp-pot-provider" / "server"
          print("bgutil script server_home:", server_home if server_home.exists() else "not found")
          print("bgutil generate_once.js:", (server_home / "build" / "generate_once.js").exists())

      - name: Materialize runtime API keys
        run: |
          import json
          import os
          from pathlib import Path

          payload = {}
          for name in ("ALPHA_VANTAGE_API_KEY", "NAVER_CLIENT_ID", "NAVER_CLIENT_SECRET", "OPENDART_API_KEY"):
              value = os.environ.get(name, "").strip()
              if value:
                  payload[name] = value
          if not payload:
              print("::notice::No optional vendor API keys were provided. YouTube verification will rely on unauthenticated/public fallbacks.")
              raise SystemExit(0)
          runtime_path = Path(os.environ["RUNNER_TEMP"]) / "tradingagents-youtube-api-keys.json"
          runtime_path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"TRADINGAGENTS_API_KEYS_PATH={runtime_path}\n")

      - name: Materialize optional YouTube cookies
        run: |
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("YOUTUBE_COOKIES_TXT", "").strip()
          raw_b64 = os.environ.get("YOUTUBE_COOKIES_TXT_B64", "").strip()
          if raw_b64:
              try:
                  raw = base64.b64decode(raw_b64).decode("utf-8")
              except Exception as exc:
                  raise SystemExit(f"YOUTUBE_COOKIES_TXT_B64 could not be decoded: {exc}") from exc
          if not raw:
              print("::notice::No YouTube cookies secret provided. Caption collection will rely on throttled anonymous requests.")
              raise SystemExit(0)

          cookie_path = Path(os.environ["RUNNER_TEMP"]) / "youtube-cookies.txt"
          cookie_path.write_text(raw.rstrip() + "\n", encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"YOUTUBE_COOKIES_FILE={cookie_path}\n")
              handle.write(f"TRADINGAGENTS_YOUTUBE_COOKIES_FILE={cookie_path}\n")
          print("Materialized YouTube cookies for yt-dlp and caption requests.")

      - name: Resolve Codex runtime
        run: |
          import os
          import subprocess
          from pathlib import Path

          def add_env(name, value):
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                  handle.write(f"{name}={value}\n")

          def usable(path):
              if not path or not Path(path).exists():
                  return False
              try:
                  result = subprocess.run([str(path), "--version"], stdout=subprocess.DEVNULL, stderr=subprocess.STDOUT, check=False)
              except OSError:
                  return False
              return result.returncode == 0

          candidates = []
          if os.environ.get("CODEX_BINARY", "").strip():
              candidates.append(Path(os.environ["CODEX_BINARY"]))
          user_profile = Path(os.environ.get("USERPROFILE", ""))
          candidates.append(user_profile / ".codex" / ".sandbox-bin" / "codex.exe")
          for pattern in (
              "C:/Users/*/.codex/.sandbox-bin/codex.exe",
              "C:/Users/*/.vscode/extensions/openai.chatgpt-*/bin/windows-x86_64/codex.exe",
          ):
              candidates.extend(sorted(Path("C:/").glob(pattern.removeprefix("C:/")), key=lambda p: p.stat().st_mtime, reverse=True))

          seen = set()
          for candidate in candidates:
              key = os.path.normcase(os.path.abspath(candidate))
              if key in seen:
                  continue
              seen.add(key)
              if usable(candidate):
                  add_env("CODEX_BINARY", str(candidate))
                  if not os.environ.get("CODEX_HOME", "").strip() and candidate.parent.name.lower() == ".sandbox-bin":
                      add_env("CODEX_HOME", str(candidate.parent.parent))
                  print(f"Resolved Codex binary: {candidate}")
                  raise SystemExit(0)
          raise SystemExit("Could not find a usable Codex binary for gpt-5.5 verification.")

      - name: Verify Codex login and model availability
        run: |
          import os
          from pathlib import Path
          from tradingagents.llm_clients.codex_app_server import CodexAppServerAuthError, CodexAppServerBinaryError, CodexModelUnavailableError
          from tradingagents.llm_clients.codex_preflight import run_codex_preflight

          try:
              result = run_codex_preflight(
                  codex_binary=os.environ.get("CODEX_BINARY") or None,
                  model="gpt-5.5",
                  request_timeout=30.0,
                  workspace_dir=Path(os.environ["TRADINGAGENTS_CODEX_WORKSPACE_DIR"]),
                  cleanup_threads=True,
                  fallback_models=[],
              )
          except CodexAppServerAuthError as exc:
              raise SystemExit(f"Codex login is required on the self-hosted runner: {exc}") from exc
          except CodexAppServerBinaryError as exc:
              raise SystemExit(f"Codex binary is not usable: {exc}") from exc
          except CodexModelUnavailableError as exc:
              raise SystemExit(f"gpt-5.5 is not available for this Codex account: {exc}") from exc
          print("Codex preflight passed:", result.account, result.resolved_model)

      - name: Rebuild base scheduled site
        run: |
          import os
          import subprocess
          import sys

          args = [
              sys.executable,
              "-u",
              "-m",
              "tradingagents.scheduled",
              "--config",
              "config/scheduled_analysis_korea.toml",
              "--site-only",
              "--site-dir",
              os.environ["TRADINGAGENTS_SITE_DIR"],
          ]
          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]
          subprocess.check_call(args)

      - name: Run YouTube verification reports
        timeout-minutes: 180
        run: |
          import os
          import subprocess
          import sys

          lookback_hours = "${{ github.event.inputs.lookback_hours }}".strip() or "24"
          max_videos = "${{ github.event.inputs.max_videos }}".strip() or "50"
          max_entries_per_url = "${{ github.event.inputs.max_entries_per_url }}".strip() or "25"
          max_parallel_videos = "${{ github.event.inputs.max_parallel_videos }}".strip() or "4"
          channel_urls = "${{ github.event.inputs.channel_urls }}".strip()
          publish = "${{ github.event.inputs.publish }}".strip().lower()

          args = [
              sys.executable,
              "-u",
              "-m",
              "tradingagents.youtube.runner",
              "--config",
              "config/youtube_daily.toml",
              "--lookback-hours",
              lookback_hours,
              "--max-videos",
              max_videos,
              "--max-entries-per-url",
              max_entries_per_url,
              "--max-parallel-videos",
              max_parallel_videos,
              "--site-dir",
              os.environ["TRADINGAGENTS_SITE_DIR"],
          ]
          archive_dir = os.environ.get("TRADINGAGENTS_YOUTUBE_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]
          if channel_urls:
              args += ["--channel-urls", channel_urls]
          if publish == "false":
              args += ["--no-publish"]
          subprocess.check_call(args)

      - name: Add Git Bash to PATH for Pages packaging
        run: |
          import os
          from pathlib import Path

          for candidate in (Path("C:/Program Files/Git/bin"), Path("C:/Program Files/Git/usr/bin")):
              if (candidate / "bash.exe").exists():
                  with open(os.environ["GITHUB_PATH"], "a", encoding="utf-8") as handle:
                      handle.write(f"{candidate}\n")
                  print(f"Added Git Bash path: {candidate}")
                  raise SystemExit(0)
          raise SystemExit("bash.exe was not found under the expected Git for Windows directories.")

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-youtube
          path: site

      - name: Clean Codex workspace
        if: ${{ always() }}
        run: |
          import os
          import shutil
          from pathlib import Path

          workspace = os.environ.get("TRADINGAGENTS_CODEX_WORKSPACE_DIR", "").strip()
          temp = os.environ.get("RUNNER_TEMP", "").strip()
          if workspace and temp:
              workspace_path = Path(workspace).resolve()
              temp_path = Path(temp).resolve()
              if os.path.commonpath([str(workspace_path), str(temp_path)]) == str(temp_path) and workspace_path.exists():
                  shutil.rmtree(workspace_path, ignore_errors=True)

  deploy:
    needs: build_youtube_pages
    if: ${{ needs.build_youtube_pages.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-youtube
