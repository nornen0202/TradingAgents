name: Daily Codex Analysis

on:
  schedule:
    # Target: 6:00 KST weekdays for KR. Start after the US overlay close window to avoid runner contention.
    - cron: '10 21 * * 0-4'
    # Backup probes absorb occasional GitHub schedule event drops. The gate job skips duplicates.
    - cron: '40 21 * * 0-4'
    - cron: '10 22 * * 0-4'
    # Target: 16:00 KST weekdays for US. Start after the KR overlay close window to avoid runner contention.
    - cron: '10 7 * * 1-5'
    # Backup probes absorb occasional GitHub schedule event drops. The gate job skips duplicates.
    - cron: '40 7 * * 1-5'
    - cron: '10 8 * * 1-5'
    # Late recovery probes cover delayed KR overlay publication without waiting for the watchdog.
    - cron: '10 9 * * 1-5'
    - cron: '10 10 * * 1-5'
    - cron: '10 11 * * 1-5'
    - cron: '10 12 * * 1-5'
  workflow_dispatch:
    inputs:
      profile:
        description: "Run profile: us / kr / all (default all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - us
          - kr
      tickers:
        description: "Optional comma-separated tickers override"
        required: false
        type: string
      ticker_universe_mode:
        description: "Ticker source mode: config_only / config_plus_account / account_only"
        required: false
        default: "config_only"
        type: choice
        options:
          - config_only
          - config_plus_account
          - account_only
      trade_date:
        description: "Optional YYYY-MM-DD trade date override"
        required: false
        type: string
      site_only:
        description: "Only rebuild GitHub Pages from archived runs"
        required: false
        type: boolean
        default: false
      analysis_mode:
        description: "Analysis mode: full / smoke"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - smoke
      max_parallel_tickers:
        description: "Maximum ticker workers to run concurrently"
        required: false
        default: "3"
        type: string
      daily_active_ticker_limit:
        description: "Limit full analysis to the first N resolved tickers; smoke defaults to 3"
        required: false
        type: string
      per_ticker_timeout_minutes:
        description: "Timeout for each ticker worker"
        required: false
        default: "40"
        type: string

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  schedule_gate:
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.gate.outputs.profile }}
      should_run: ${{ steps.gate.outputs.should_run }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Decide scheduled execution
        id: gate
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: daily-codex-analysis.yml
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          REQUESTED_PROFILE: ${{ github.event.inputs.profile }}
          MANUAL_DEFAULT_PROFILE: all
          SCHEDULE_GATE_TARGETS_JSON: >-
            {
              "10 7 * * 1-5": {"profile": "us", "window_start": "16:00", "target_jobs": ["analyze_us"], "blockers": [{"name": "intraday-overlay-kr-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "09:00", "target_jobs": ["overlay_refresh_kr", "publish_overlay_site", "deploy_overlay"]}]},
              "40 7 * * 1-5": {"profile": "us", "window_start": "16:00", "target_jobs": ["analyze_us"], "blockers": [{"name": "intraday-overlay-kr-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "09:00", "target_jobs": ["overlay_refresh_kr", "publish_overlay_site", "deploy_overlay"]}]},
              "10 8 * * 1-5": {"profile": "us", "window_start": "16:00", "target_jobs": ["analyze_us"], "blockers": [{"name": "intraday-overlay-kr-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "09:00", "target_jobs": ["overlay_refresh_kr", "publish_overlay_site", "deploy_overlay"]}]},
              "10 9 * * 1-5": {"profile": "us", "window_start": "16:00", "target_jobs": ["analyze_us"], "blockers": [{"name": "intraday-overlay-kr-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "09:00", "target_jobs": ["overlay_refresh_kr", "publish_overlay_site", "deploy_overlay"]}]},
              "10 10 * * 1-5": {"profile": "us", "window_start": "16:00", "target_jobs": ["analyze_us"], "blockers": [{"name": "intraday-overlay-kr-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "09:00", "target_jobs": ["overlay_refresh_kr", "publish_overlay_site", "deploy_overlay"]}]},
              "10 11 * * 1-5": {"profile": "us", "window_start": "16:00", "target_jobs": ["analyze_us"], "blockers": [{"name": "intraday-overlay-kr-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "09:00", "target_jobs": ["overlay_refresh_kr", "publish_overlay_site", "deploy_overlay"]}]},
              "10 12 * * 1-5": {"profile": "us", "window_start": "16:00", "target_jobs": ["analyze_us"], "blockers": [{"name": "intraday-overlay-kr-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "09:00", "target_jobs": ["overlay_refresh_kr", "publish_overlay_site", "deploy_overlay"]}]},
              "10 21 * * 0-4": {"profile": "kr", "window_start": "06:00", "target_jobs": ["analyze_kr"], "blockers": [{"name": "intraday-overlay-us-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "23:00", "target_jobs": ["overlay_refresh_us", "publish_overlay_site", "deploy_overlay"]}, {"name": "daily-youtube-publish", "workflow_file": "daily-youtube-reports.yml", "window_start": "05:00", "target_jobs": ["build_youtube_pages", "deploy"]}]},
              "40 21 * * 0-4": {"profile": "kr", "window_start": "06:00", "target_jobs": ["analyze_kr"], "blockers": [{"name": "intraday-overlay-us-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "23:00", "target_jobs": ["overlay_refresh_us", "publish_overlay_site", "deploy_overlay"]}, {"name": "daily-youtube-publish", "workflow_file": "daily-youtube-reports.yml", "window_start": "05:00", "target_jobs": ["build_youtube_pages", "deploy"]}]},
              "10 22 * * 0-4": {"profile": "kr", "window_start": "06:00", "target_jobs": ["analyze_kr"], "blockers": [{"name": "intraday-overlay-us-publish", "workflow_file": "intraday-overlay-refresh.yml", "window_start": "23:00", "target_jobs": ["overlay_refresh_us", "publish_overlay_site", "deploy_overlay"]}, {"name": "daily-youtube-publish", "workflow_file": "daily-youtube-reports.yml", "window_start": "05:00", "target_jobs": ["build_youtube_pages", "deploy"]}]}
            }
        run: python .github/scripts/scheduled_workflow_gate.py

  analyze_us:
    needs:
      - schedule_gate
    if: ${{ github.ref == 'refs/heads/main' && needs.schedule_gate.outputs.should_run == 'true' && (needs.schedule_gate.outputs.profile == 'all' || needs.schedule_gate.outputs.profile == 'us') }}
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        shell: python {0}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
      TRADINGAGENTS_CODEX_ALLOW_MODEL_FALLBACK: "0"
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      TRADINGAGENTS_TRANSLATION_MODEL_PATH: ${{ vars.TRADINGAGENTS_TRANSLATION_MODEL_PATH }}
      TRADINGAGENTS_TRANSLATION_TOKENIZER_PATH: ${{ vars.TRADINGAGENTS_TRANSLATION_TOKENIZER_PATH }}
      TRADINGAGENTS_TRANSLATION_DEVICE: ${{ vars.TRADINGAGENTS_TRANSLATION_DEVICE }}
      TRADINGAGENTS_ALLOW_LARGE_TRANSLATION_MODEL: ${{ vars.TRADINGAGENTS_ALLOW_LARGE_TRANSLATION_MODEL }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      ALPACA_ENDPOINT: ${{ secrets.ALPACA_ENDPOINT }}
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_PRODUCT_CODE: ${{ secrets.KIS_PRODUCT_CODE }}
      KIS_Developers_APP_KEY: ${{ secrets.KIS_Developers_APP_KEY }}
      KIS_Developers_APP_SECRET: ${{ secrets.KIS_Developers_APP_SECRET }}
      KIS_Developers_ACCOUNT_NO: ${{ secrets.KIS_Developers_ACCOUNT_NO }}
      KIS_Developers_PRODUCT_CODE: ${{ secrets.KIS_Developers_PRODUCT_CODE }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Prepare runner disk and Codex workspace
        run: |
          import os
          import shutil
          from pathlib import Path

          def append_env(name, value):
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                  handle.write(f"{name}={value}\n")

          def is_within(child, parent):
              child_path = os.path.normcase(os.path.abspath(child))
              parent_path = os.path.normcase(os.path.abspath(parent))
              return os.path.commonpath([child_path, parent_path]) == parent_path

          def remove_codex_log_files(root):
              if not root:
                  return
              root_path = Path(root)
              if not root_path.exists():
                  return
              for candidate in root_path.glob("logs_*.sqlite*"):
                  if not candidate.is_file():
                      continue
                  try:
                      candidate.unlink()
                  except OSError as exc:
                      print(f"::warning::Could not remove {candidate}: {exc}")

          user_profile = Path(os.environ.get("USERPROFILE", ""))
          legacy_codex_home = user_profile / ".codex" / "tradingagents-workspace" / ".codex-home"
          remove_codex_log_files(legacy_codex_home)

          sandbox_binary = user_profile / ".codex" / ".sandbox-bin" / "codex.exe"
          installed_root = Path("C:/Program Files/WindowsApps")
          installed_candidates = []
          if installed_root.exists():
              try:
                  installed_candidates = sorted(
                      installed_root.glob("OpenAI.Codex_*/app/resources/codex.exe"),
                      key=lambda path: path.stat().st_mtime,
                      reverse=True,
                  )
              except OSError as exc:
                  print(f"::warning::Could not scan installed Codex app binaries: {exc}")
          if installed_candidates:
              installed_binary = installed_candidates[0]
              sandbox_binary.parent.mkdir(parents=True, exist_ok=True)
              should_copy = not sandbox_binary.exists()
              if not should_copy:
                  current = sandbox_binary.stat()
                  installed = installed_binary.stat()
                  should_copy = installed.st_mtime > current.st_mtime or installed.st_size != current.st_size
              if should_copy:
                  shutil.copy2(installed_binary, sandbox_binary)
                  print(f"Updated Codex sandbox binary from installed app: {installed_binary}")

          runner_temp = Path(os.environ["RUNNER_TEMP"]).resolve()
          workspace = (runner_temp / "tradingagents-codex-workspace").resolve()
          if not is_within(workspace, runner_temp):
              raise SystemExit(f"Refusing to clean Codex workspace outside RUNNER_TEMP: {workspace}")
          if workspace.exists():
              shutil.rmtree(workspace, ignore_errors=True)
          workspace.mkdir(parents=True, exist_ok=True)
          append_env("TRADINGAGENTS_CODEX_WORKSPACE_DIR", str(workspace))
          print(f"Using per-run Codex workspace: {workspace}")

          free_bytes = shutil.disk_usage("C:/").free
          print(f"C: free space after cleanup: {free_bytes / (1024 ** 3):.2f} GB")
          if free_bytes < 5 * 1024 ** 3:
              raise SystemExit("C: free space is below 5GB after cleanup; refusing to start analysis.")

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install TradingAgents
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", ".[translation]"])

      - name: Materialize runtime API keys
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          import json
          import os
          from pathlib import Path

          runtime_path = Path(os.environ["RUNNER_TEMP"]) / "tradingagents-api-keys.json"
          payload = {}
          alias_groups = {
              "ALPHA_VANTAGE_API_KEY": ("ALPHA_VANTAGE_API_KEY",),
              "MASSIVE_API_KEY": ("MASSIVE_API_KEY", "POLYGON_API_KEY", "POLY_API_KEY"),
              "ALPACA_ENDPOINT": ("ALPACA_ENDPOINT", "APCA_API_BASE_URL"),
              "ALPACA_API_KEY_ID": ("ALPACA_API_KEY_ID", "APCA_API_KEY_ID", "ALPACA_KEY_ID"),
              "ALPACA_SECRET_KEY": ("ALPACA_SECRET_KEY", "APCA_API_SECRET_KEY", "ALPACA_API_SECRET"),
              "ALPACA_DATA_FEED": ("ALPACA_DATA_FEED", "APCA_DATA_FEED"),
              "NAVER_CLIENT_ID": ("NAVER_CLIENT_ID",),
              "NAVER_CLIENT_SECRET": ("NAVER_CLIENT_SECRET",),
              "OPENDART_API_KEY": ("OPENDART_API_KEY",),
              "KIS_APP_KEY": ("KIS_APP_KEY", "KIS_Developers_APP_KEY"),
              "KIS_APP_SECRET": ("KIS_APP_SECRET", "KIS_Developers_APP_SECRET"),
              "KIS_ACCOUNT_NO": ("KIS_ACCOUNT_NO", "KIS_Developers_ACCOUNT_NO"),
              "KIS_PRODUCT_CODE": ("KIS_PRODUCT_CODE", "KIS_Developers_PRODUCT_CODE"),
          }

          for canonical_name, candidates in alias_groups.items():
              for candidate in candidates:
                  value = os.environ.get(candidate)
                  if value and value.strip():
                      payload[canonical_name] = value
                      payload[candidate] = value
                      break

          if not payload:
              print("::warning::No GitHub Actions secrets were available for TradingAgents API keys. Runtime will rely on fallback discovery only.")
              raise SystemExit(0)

          runtime_path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"TRADINGAGENTS_API_KEYS_PATH={runtime_path}\n")
          print("Materialized TradingAgents API keys for runtime use.")

      - name: Resolve Codex runtime
        run: |
          import os
          import subprocess
          from pathlib import Path

          site_only = "${{ github.event.inputs.site_only }}".strip().lower()
          if site_only == "true":
              print("Skipping Codex runtime resolution because site_only=true.")
              raise SystemExit(0)

          def add_env(name, value):
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                  handle.write(f"{name}={value}\n")

          def test_codex_candidate(candidate):
              if not candidate:
                  return False
              candidate_path = Path(candidate)
              if not candidate_path.exists():
                  return False
              try:
                  result = subprocess.run(
                      [str(candidate_path), "--version"],
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.STDOUT,
                      check=False,
                  )
              except OSError as exc:
                  print(f"::warning::Codex candidate failed: {candidate_path} :: {exc}")
                  return False
              return result.returncode == 0

          candidates = []
          codex_binary = os.environ.get("CODEX_BINARY", "").strip()
          if codex_binary:
              candidates.append(Path(codex_binary))

          user_profile = Path(os.environ.get("USERPROFILE", ""))
          candidates.append(user_profile / ".codex" / ".sandbox-bin" / "codex.exe")

          def sorted_matches(pattern):
              try:
                  return sorted(Path("C:/").glob(pattern.removeprefix("C:/")), key=lambda path: path.stat().st_mtime, reverse=True)
              except OSError as exc:
                  print(f"::warning::Could not scan Codex candidates for {pattern}: {exc}")
                  return []

          for pattern in (
              "C:/Users/*/.codex/.sandbox-bin/codex.exe",
              "C:/Users/*/.vscode/extensions/openai.chatgpt-*/bin/windows-x86_64/codex.exe",
          ):
              candidates.extend(sorted_matches(pattern))

          seen = set()
          resolved_binary = None
          for candidate in candidates:
              key = os.path.normcase(os.path.abspath(candidate))
              if key in seen:
                  continue
              seen.add(key)
              if test_codex_candidate(candidate):
                  resolved_binary = Path(candidate)
                  break

          if not resolved_binary:
              raise SystemExit("Could not find a usable Codex binary. Set the CODEX_BINARY repository variable or install Codex for the runner service account.")

          add_env("CODEX_BINARY", str(resolved_binary))
          print(f"Resolved Codex binary: {resolved_binary}")

          resolved_home = os.environ.get("CODEX_HOME", "").strip()
          if not resolved_home and resolved_binary.parent.name.lower() == ".sandbox-bin":
              resolved_home = str(resolved_binary.parent.parent)

          if resolved_home:
              add_env("CODEX_HOME", resolved_home)
              print(f"Using CODEX_HOME: {resolved_home}")

      - name: Verify Codex login and model availability
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          import os
          from pathlib import Path
          from tradingagents.llm_clients.codex_app_server import CodexAppServerAuthError, CodexAppServerBinaryError, CodexModelUnavailableError
          from tradingagents.llm_clients.codex_preflight import run_codex_preflight

          site_only = "${{ github.event.inputs.site_only }}".strip().lower()
          if site_only == "true":
              print("Skipping Codex preflight because site_only=true.")
              raise SystemExit(0)

          workspace_dir = Path(os.environ["GITHUB_WORKSPACE"]) / ".codex-preflight"
          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          github_env = os.getenv("GITHUB_ENV")
          preferred_deep_model = "gpt-5.5"
          preferred_quick_model = "gpt-5.4-mini"
          allow_fallback = os.getenv("TRADINGAGENTS_CODEX_ALLOW_MODEL_FALLBACK", "1").strip().lower()
          deep_fallback_models = [] if allow_fallback in {"0", "false", "no", "off"} else [
              "gpt-5.4",
              "gpt-5.3-codex",
              "gpt-5.3-codex-spark",
              "gpt-5.2-codex",
              "gpt-5.2",
              "gpt-5.4-mini",
          ]

          def write_summary(lines):
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")

          try:
              deep_result = run_codex_preflight(
                  codex_binary=None,
                  model=preferred_deep_model,
                  request_timeout=30.0,
                  workspace_dir=workspace_dir,
                  cleanup_threads=True,
                  fallback_models=deep_fallback_models,
              )
              quick_fallback_models = [] if allow_fallback in {"0", "false", "no", "off"} else [
                  "gpt-5.4",
                  deep_result.resolved_model,
              ]
              quick_result = run_codex_preflight(
                  codex_binary=None,
                  model=preferred_quick_model,
                  request_timeout=30.0,
                  workspace_dir=workspace_dir,
                  cleanup_threads=True,
                  fallback_models=quick_fallback_models,
              )
          except CodexAppServerAuthError as exc:
              message = (
                  "Codex is installed but not logged in for the runner. "
                  "Run `codex login` or `codex login --device-auth` on the runner machine, "
                  "then retry the workflow."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex login required",
                      "",
                      message,
                  ]
              )
              raise SystemExit(1)
          except CodexAppServerBinaryError as exc:
              message = (
                  "A usable Codex binary is not available for the runner. "
                  "Check the `CODEX_BINARY` repository variable or install Codex for the runner service account."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex runtime issue",
                      "",
                      message,
                      "",
                      str(exc),
                  ]
              )
              raise SystemExit(1)
          except CodexModelUnavailableError as exc:
              message = (
                  "No configured Codex model or fallback model is available for the runner. "
                  "Update the Codex installation/account or adjust the fallback list."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex model unavailable",
                      "",
                      message,
                      "",
                      str(exc),
                  ]
              )
              raise SystemExit(1)

          if deep_result.fallback_used:
              warning = (
                  f"Preferred deep/output Codex model {deep_result.requested_model} is not available on this runner; "
                  f"using {deep_result.resolved_model} from model/list."
              )
              print(f"::warning::{warning}")
          if quick_result.fallback_used:
              warning = (
                  f"Preferred quick Codex model {quick_result.requested_model} is not available on this runner; "
                  f"using {quick_result.resolved_model} from model/list."
              )
              print(f"::warning::{warning}")

          if github_env:
              with open(github_env, "a", encoding="utf-8") as handle:
                  handle.write("TRADINGAGENTS_CODEX_PREFLIGHT_OK=1\n")
                  handle.write(f"TRADINGAGENTS_CODEX_DEEP_MODEL={deep_result.resolved_model}\n")
                  handle.write(f"TRADINGAGENTS_CODEX_OUTPUT_MODEL={deep_result.resolved_model}\n")
                  handle.write(f"TRADINGAGENTS_CODEX_QUICK_MODEL={quick_result.resolved_model}\n")

          print("Codex account:", deep_result.account)
          print("First available models:", ", ".join(deep_result.models[:8]))
          write_summary(
              [
                  "## Codex preflight passed",
                  "",
                  f"- Account: {deep_result.account}",
                  f"- Deep/output requested model: {deep_result.requested_model}",
                  f"- Deep/output resolved model: {deep_result.resolved_model}",
                  f"- Quick requested model: {quick_result.requested_model}",
                  f"- Quick resolved model: {quick_result.resolved_model}",
                  f"- Models: {', '.join(deep_result.models[:8])}",
                  f"- Binary: {os.getenv('CODEX_BINARY', '(auto)')}",
              ]
          )

      - name: Run scheduled analysis and build site
        timeout-minutes: 300
        run: |
          import os
          import subprocess
          import sys
          from pathlib import Path

          config_path = "config/scheduled_analysis.toml"
          if not Path(config_path).is_file():
              raise SystemExit(
                  "Missing config/scheduled_analysis.toml. Copy config/scheduled_analysis.example.toml, set your real tickers, and commit the file before enabling the schedule."
              )

          site_dir = os.environ.get("TRADINGAGENTS_SITE_DIR")
          if not site_dir:
              raise SystemExit("TRADINGAGENTS_SITE_DIR is not set.")

          args = [
              sys.executable,
              "-u",
              "-m",
              "tradingagents.scheduled",
              "--config",
              config_path,
              "--run-mode",
              "full",
              "--site-dir",
              site_dir,
              "--label",
              "github-actions-us",
          ]

          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]
          else:
              print("TRADINGAGENTS_ARCHIVE_DIR is not set. Run history will live under the repository checkout unless the config overrides it.")

          manual_tickers = "${{ github.event.inputs.tickers }}".strip()
          if manual_tickers:
              args += ["--tickers", manual_tickers]

          ticker_universe_mode = "${{ github.event.inputs.ticker_universe_mode }}".strip()
          if ticker_universe_mode:
              args += ["--ticker-universe-mode", ticker_universe_mode]

          manual_trade_date = "${{ github.event.inputs.trade_date }}".strip()
          if manual_trade_date:
              args += ["--trade-date", manual_trade_date]

          site_only = "${{ github.event.inputs.site_only }}".strip().lower()
          if site_only == "true":
              args += ["--site-only"]

          analysis_mode = "${{ github.event.inputs.analysis_mode }}".strip() or "full"
          args += ["--analysis-mode", analysis_mode]

          max_parallel_tickers = "${{ github.event.inputs.max_parallel_tickers }}".strip()
          if max_parallel_tickers:
              args += ["--max-parallel-tickers", max_parallel_tickers]

          per_ticker_timeout_minutes = "${{ github.event.inputs.per_ticker_timeout_minutes }}".strip()
          if per_ticker_timeout_minutes:
              args += ["--per-ticker-timeout-minutes", per_ticker_timeout_minutes]

          daily_active_ticker_limit = "${{ github.event.inputs.daily_active_ticker_limit }}".strip()
          if analysis_mode == "smoke" and not daily_active_ticker_limit:
              daily_active_ticker_limit = "3"
          if daily_active_ticker_limit:
              args += ["--daily-active-ticker-limit", daily_active_ticker_limit]

          subprocess.check_call(args)

      - name: Clean Codex runtime workspace
        if: ${{ always() }}
        run: |
          import os
          import shutil
          from pathlib import Path

          def is_within(child, parent):
              child_path = os.path.normcase(os.path.abspath(child))
              parent_path = os.path.normcase(os.path.abspath(parent))
              return os.path.commonpath([child_path, parent_path]) == parent_path

          def remove_codex_log_files(root):
              if not root:
                  return
              root_path = Path(root)
              if not root_path.exists():
                  return
              for candidate in root_path.glob("logs_*.sqlite*"):
                  if candidate.is_file():
                      try:
                          candidate.unlink()
                      except OSError as exc:
                          print(f"::warning::Could not remove {candidate}: {exc}")

          workspace = os.environ.get("TRADINGAGENTS_CODEX_WORKSPACE_DIR", "").strip()
          runner_temp = os.environ.get("RUNNER_TEMP", "").strip()
          if workspace and runner_temp and is_within(workspace, runner_temp) and Path(workspace).exists():
              shutil.rmtree(workspace, ignore_errors=True)

          legacy_codex_home = Path(os.environ.get("USERPROFILE", "")) / ".codex" / "tradingagents-workspace" / ".codex-home"
          remove_codex_log_files(legacy_codex_home)

  analyze_kr:
    needs:
      - schedule_gate
    if: ${{ github.ref == 'refs/heads/main' && needs.schedule_gate.outputs.should_run == 'true' && (needs.schedule_gate.outputs.profile == 'all' || needs.schedule_gate.outputs.profile == 'kr') }}
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        shell: python {0}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
      TRADINGAGENTS_CODEX_ALLOW_MODEL_FALLBACK: "0"
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      TRADINGAGENTS_TRANSLATION_MODEL_PATH: ${{ vars.TRADINGAGENTS_TRANSLATION_MODEL_PATH }}
      TRADINGAGENTS_TRANSLATION_TOKENIZER_PATH: ${{ vars.TRADINGAGENTS_TRANSLATION_TOKENIZER_PATH }}
      TRADINGAGENTS_TRANSLATION_DEVICE: ${{ vars.TRADINGAGENTS_TRANSLATION_DEVICE }}
      TRADINGAGENTS_ALLOW_LARGE_TRANSLATION_MODEL: ${{ vars.TRADINGAGENTS_ALLOW_LARGE_TRANSLATION_MODEL }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      ALPACA_ENDPOINT: ${{ secrets.ALPACA_ENDPOINT }}
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_PRODUCT_CODE: ${{ secrets.KIS_PRODUCT_CODE }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Prepare runner disk and Codex workspace
        run: |
          import os
          import shutil
          from pathlib import Path

          def append_env(name, value):
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                  handle.write(f"{name}={value}\n")

          def is_within(child, parent):
              child_path = os.path.normcase(os.path.abspath(child))
              parent_path = os.path.normcase(os.path.abspath(parent))
              return os.path.commonpath([child_path, parent_path]) == parent_path

          def remove_codex_log_files(root):
              if not root:
                  return
              root_path = Path(root)
              if not root_path.exists():
                  return
              for candidate in root_path.glob("logs_*.sqlite*"):
                  if not candidate.is_file():
                      continue
                  try:
                      candidate.unlink()
                  except OSError as exc:
                      print(f"::warning::Could not remove {candidate}: {exc}")

          user_profile = Path(os.environ.get("USERPROFILE", ""))
          legacy_codex_home = user_profile / ".codex" / "tradingagents-workspace" / ".codex-home"
          remove_codex_log_files(legacy_codex_home)

          sandbox_binary = user_profile / ".codex" / ".sandbox-bin" / "codex.exe"
          installed_root = Path("C:/Program Files/WindowsApps")
          installed_candidates = []
          if installed_root.exists():
              try:
                  installed_candidates = sorted(
                      installed_root.glob("OpenAI.Codex_*/app/resources/codex.exe"),
                      key=lambda path: path.stat().st_mtime,
                      reverse=True,
                  )
              except OSError as exc:
                  print(f"::warning::Could not scan installed Codex app binaries: {exc}")
          if installed_candidates:
              installed_binary = installed_candidates[0]
              sandbox_binary.parent.mkdir(parents=True, exist_ok=True)
              should_copy = not sandbox_binary.exists()
              if not should_copy:
                  current = sandbox_binary.stat()
                  installed = installed_binary.stat()
                  should_copy = installed.st_mtime > current.st_mtime or installed.st_size != current.st_size
              if should_copy:
                  shutil.copy2(installed_binary, sandbox_binary)
                  print(f"Updated Codex sandbox binary from installed app: {installed_binary}")

          runner_temp = Path(os.environ["RUNNER_TEMP"]).resolve()
          workspace = (runner_temp / "tradingagents-codex-workspace").resolve()
          if not is_within(workspace, runner_temp):
              raise SystemExit(f"Refusing to clean Codex workspace outside RUNNER_TEMP: {workspace}")
          if workspace.exists():
              shutil.rmtree(workspace, ignore_errors=True)
          workspace.mkdir(parents=True, exist_ok=True)
          append_env("TRADINGAGENTS_CODEX_WORKSPACE_DIR", str(workspace))
          print(f"Using per-run Codex workspace: {workspace}")

          free_bytes = shutil.disk_usage("C:/").free
          print(f"C: free space after cleanup: {free_bytes / (1024 ** 3):.2f} GB")
          if free_bytes < 5 * 1024 ** 3:
              raise SystemExit("C: free space is below 5GB after cleanup; refusing to start analysis.")

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install TradingAgents
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", ".[translation]"])

      - name: Materialize runtime API keys
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          import json
          import os
          from pathlib import Path

          runtime_path = Path(os.environ["RUNNER_TEMP"]) / "tradingagents-api-keys.json"
          payload = {}
          alias_groups = {
              "ALPHA_VANTAGE_API_KEY": ("ALPHA_VANTAGE_API_KEY",),
              "MASSIVE_API_KEY": ("MASSIVE_API_KEY", "POLYGON_API_KEY", "POLY_API_KEY"),
              "ALPACA_ENDPOINT": ("ALPACA_ENDPOINT", "APCA_API_BASE_URL"),
              "ALPACA_API_KEY_ID": ("ALPACA_API_KEY_ID", "APCA_API_KEY_ID", "ALPACA_KEY_ID"),
              "ALPACA_SECRET_KEY": ("ALPACA_SECRET_KEY", "APCA_API_SECRET_KEY", "ALPACA_API_SECRET"),
              "ALPACA_DATA_FEED": ("ALPACA_DATA_FEED", "APCA_DATA_FEED"),
              "NAVER_CLIENT_ID": ("NAVER_CLIENT_ID",),
              "NAVER_CLIENT_SECRET": ("NAVER_CLIENT_SECRET",),
              "OPENDART_API_KEY": ("OPENDART_API_KEY",),
              "KIS_APP_KEY": ("KIS_APP_KEY", "KIS_Developers_APP_KEY"),
              "KIS_APP_SECRET": ("KIS_APP_SECRET", "KIS_Developers_APP_SECRET"),
              "KIS_ACCOUNT_NO": ("KIS_ACCOUNT_NO", "KIS_Developers_ACCOUNT_NO"),
              "KIS_PRODUCT_CODE": ("KIS_PRODUCT_CODE", "KIS_Developers_PRODUCT_CODE"),
          }

          for canonical_name, candidates in alias_groups.items():
              for candidate in candidates:
                  value = os.environ.get(candidate)
                  if value and value.strip():
                      payload[canonical_name] = value
                      payload[candidate] = value
                      break

          if not payload:
              print("::warning::No GitHub Actions secrets were available for TradingAgents API keys. Runtime will rely on fallback discovery only.")
              raise SystemExit(0)

          runtime_path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"TRADINGAGENTS_API_KEYS_PATH={runtime_path}\n")
          print("Materialized TradingAgents API keys for runtime use.")

      - name: Report KR vendor credential status
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          import os
          from tradingagents.dataflows.naver_news import validate_naver_credentials
          from tradingagents.dataflows.opendart import validate_opendart_credentials
          from tradingagents.dataflows.vendor_exceptions import VendorConfigurationError, VendorTransientError

          checks = (
              ("Naver News", validate_naver_credentials),
              ("OpenDART", validate_opendart_credentials),
          )

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          summary_lines = [
              "## KR vendor credential status",
              "",
          ]
          failures = []
          for label, validator in checks:
              try:
                  validator()
                  print(f"{label}: OK")
                  summary_lines.append(f"- {label}: OK")
              except (VendorConfigurationError, VendorTransientError) as exc:
                  message = f"{label}: {exc}"
                  failures.append(message)
                  print(f"::warning::{message}")
                  summary_lines.append(f"- {label}: warning - {exc}")

          if failures:
              print("KR vendor preflight completed with warnings. Analysis will continue using fallback routing where possible.")
              summary_lines.extend(
                  [
                      "",
                      "Analysis will continue, but KR data coverage may degrade until the missing vendors are restored.",
                  ]
              )
          else:
              print("KR vendor preflight passed.")

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\\n".join(summary_lines) + "\\n")

      - name: Resolve Codex runtime
        run: |
          import os
          import subprocess
          from pathlib import Path

          site_only = "${{ github.event.inputs.site_only }}".strip().lower()
          if site_only == "true":
              print("Skipping Codex runtime resolution because site_only=true.")
              raise SystemExit(0)

          def add_env(name, value):
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                  handle.write(f"{name}={value}\n")

          def test_codex_candidate(candidate):
              if not candidate:
                  return False
              candidate_path = Path(candidate)
              if not candidate_path.exists():
                  return False
              try:
                  result = subprocess.run(
                      [str(candidate_path), "--version"],
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.STDOUT,
                      check=False,
                  )
              except OSError as exc:
                  print(f"::warning::Codex candidate failed: {candidate_path} :: {exc}")
                  return False
              return result.returncode == 0

          candidates = []
          codex_binary = os.environ.get("CODEX_BINARY", "").strip()
          if codex_binary:
              candidates.append(Path(codex_binary))

          user_profile = Path(os.environ.get("USERPROFILE", ""))
          candidates.append(user_profile / ".codex" / ".sandbox-bin" / "codex.exe")

          def sorted_matches(pattern):
              try:
                  return sorted(Path("C:/").glob(pattern.removeprefix("C:/")), key=lambda path: path.stat().st_mtime, reverse=True)
              except OSError as exc:
                  print(f"::warning::Could not scan Codex candidates for {pattern}: {exc}")
                  return []

          for pattern in (
              "C:/Users/*/.codex/.sandbox-bin/codex.exe",
              "C:/Users/*/.vscode/extensions/openai.chatgpt-*/bin/windows-x86_64/codex.exe",
          ):
              candidates.extend(sorted_matches(pattern))

          seen = set()
          resolved_binary = None
          for candidate in candidates:
              key = os.path.normcase(os.path.abspath(candidate))
              if key in seen:
                  continue
              seen.add(key)
              if test_codex_candidate(candidate):
                  resolved_binary = Path(candidate)
                  break

          if not resolved_binary:
              raise SystemExit("Could not find a usable Codex binary. Set the CODEX_BINARY repository variable or install Codex for the runner service account.")

          add_env("CODEX_BINARY", str(resolved_binary))
          print(f"Resolved Codex binary: {resolved_binary}")

          resolved_home = os.environ.get("CODEX_HOME", "").strip()
          if not resolved_home and resolved_binary.parent.name.lower() == ".sandbox-bin":
              resolved_home = str(resolved_binary.parent.parent)

          if resolved_home:
              add_env("CODEX_HOME", resolved_home)
              print(f"Using CODEX_HOME: {resolved_home}")

      - name: Verify Codex login and model availability
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          import os
          from pathlib import Path
          from tradingagents.llm_clients.codex_app_server import CodexAppServerAuthError, CodexAppServerBinaryError, CodexModelUnavailableError
          from tradingagents.llm_clients.codex_preflight import run_codex_preflight

          site_only = "${{ github.event.inputs.site_only }}".strip().lower()
          if site_only == "true":
              print("Skipping Codex preflight because site_only=true.")
              raise SystemExit(0)

          workspace_dir = Path(os.environ["GITHUB_WORKSPACE"]) / ".codex-preflight"
          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          github_env = os.getenv("GITHUB_ENV")
          preferred_deep_model = "gpt-5.5"
          preferred_quick_model = "gpt-5.4-mini"
          allow_fallback = os.getenv("TRADINGAGENTS_CODEX_ALLOW_MODEL_FALLBACK", "1").strip().lower()
          deep_fallback_models = [] if allow_fallback in {"0", "false", "no", "off"} else [
              "gpt-5.4",
              "gpt-5.3-codex",
              "gpt-5.3-codex-spark",
              "gpt-5.2-codex",
              "gpt-5.2",
              "gpt-5.4-mini",
          ]

          def write_summary(lines):
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")

          try:
              deep_result = run_codex_preflight(
                  codex_binary=None,
                  model=preferred_deep_model,
                  request_timeout=30.0,
                  workspace_dir=workspace_dir,
                  cleanup_threads=True,
                  fallback_models=deep_fallback_models,
              )
              quick_fallback_models = [] if allow_fallback in {"0", "false", "no", "off"} else [
                  "gpt-5.4",
                  deep_result.resolved_model,
              ]
              quick_result = run_codex_preflight(
                  codex_binary=None,
                  model=preferred_quick_model,
                  request_timeout=30.0,
                  workspace_dir=workspace_dir,
                  cleanup_threads=True,
                  fallback_models=quick_fallback_models,
              )
          except CodexAppServerAuthError as exc:
              message = (
                  "Codex is installed but not logged in for the runner. "
                  "Run `codex login` or `codex login --device-auth` on the runner machine, "
                  "then retry the workflow."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex login required",
                      "",
                      message,
                  ]
              )
              raise SystemExit(1)
          except CodexAppServerBinaryError as exc:
              message = (
                  "A usable Codex binary is not available for the runner. "
                  "Check the `CODEX_BINARY` repository variable or install Codex for the runner service account."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex runtime issue",
                      "",
                      message,
                      "",
                      str(exc),
                  ]
              )
              raise SystemExit(1)
          except CodexModelUnavailableError as exc:
              message = (
                  "No configured Codex model or fallback model is available for the runner. "
                  "Update the Codex installation/account or adjust the fallback list."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex model unavailable",
                      "",
                      message,
                      "",
                      str(exc),
                  ]
              )
              raise SystemExit(1)

          if deep_result.fallback_used:
              warning = (
                  f"Preferred deep/output Codex model {deep_result.requested_model} is not available on this runner; "
                  f"using {deep_result.resolved_model} from model/list."
              )
              print(f"::warning::{warning}")
          if quick_result.fallback_used:
              warning = (
                  f"Preferred quick Codex model {quick_result.requested_model} is not available on this runner; "
                  f"using {quick_result.resolved_model} from model/list."
              )
              print(f"::warning::{warning}")

          if github_env:
              with open(github_env, "a", encoding="utf-8") as handle:
                  handle.write("TRADINGAGENTS_CODEX_PREFLIGHT_OK=1\n")
                  handle.write(f"TRADINGAGENTS_CODEX_DEEP_MODEL={deep_result.resolved_model}\n")
                  handle.write(f"TRADINGAGENTS_CODEX_OUTPUT_MODEL={deep_result.resolved_model}\n")
                  handle.write(f"TRADINGAGENTS_CODEX_QUICK_MODEL={quick_result.resolved_model}\n")

          print("Codex account:", deep_result.account)
          print("First available models:", ", ".join(deep_result.models[:8]))
          write_summary(
              [
                  "## Codex preflight passed",
                  "",
                  f"- Account: {deep_result.account}",
                  f"- Deep/output requested model: {deep_result.requested_model}",
                  f"- Deep/output resolved model: {deep_result.resolved_model}",
                  f"- Quick requested model: {quick_result.requested_model}",
                  f"- Quick resolved model: {quick_result.resolved_model}",
                  f"- Models: {', '.join(deep_result.models[:8])}",
                  f"- Binary: {os.getenv('CODEX_BINARY', '(auto)')}",
              ]
          )

      - name: Validate KIS credentials for account report
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          from tradingagents.dataflows.api_keys import get_api_key
          from tradingagents.portfolio.kis import KisClient

          app_key = get_api_key("KIS_APP_KEY")
          app_secret = get_api_key("KIS_APP_SECRET")
          if not app_key or not app_secret:
              print("::warning::KIS credentials are not configured. The account portfolio report will be skipped until KIS_APP_KEY/KIS_APP_SECRET are available.")
              raise SystemExit(0)

          try:
              client = KisClient.from_api_keys()
              token = client.issue_access_token()
              print("KIS auth preflight:", {"environment": client.environment, "token_issued": bool(token)})
          except Exception as exc:
              print(f"::warning::KIS auth preflight failed: {exc}. KR analysis will continue, but the account portfolio report may be skipped.")
              raise SystemExit(0)

          account_no = get_api_key("KIS_ACCOUNT_NO")
          product_code = get_api_key("KIS_PRODUCT_CODE") or "01"
          if not account_no:
              print("::warning::KIS account number is not configured. Broker auth works, but live account snapshot will skip/fallback until KIS_ACCOUNT_NO is set.")
              raise SystemExit(0)

          try:
              positions, summary = client.fetch_balance(
                  account_no=account_no,
                  product_code=product_code,
              )
          except Exception as exc:
              print(f"::warning::KIS account snapshot preflight failed: {exc}. KR analysis will continue, but the account portfolio report may be skipped.")
              raise SystemExit(0)

          account_result = {
              "environment": client.environment,
              "token_issued": bool(token),
              "positions_count": len(positions),
              "summary_fields": sorted((summary or {}).keys()),
          }
          print("KIS account snapshot preflight:", account_result)

      - name: Run scheduled analysis and build site
        timeout-minutes: 300
        run: |
          import os
          import subprocess
          import sys
          from pathlib import Path

          config_path = "config/scheduled_analysis_korea.toml"
          if not Path(config_path).is_file():
              raise SystemExit("Missing config/scheduled_analysis_korea.toml. Add the file before enabling the KR schedule.")

          site_dir = os.environ.get("TRADINGAGENTS_SITE_DIR")
          if not site_dir:
              raise SystemExit("TRADINGAGENTS_SITE_DIR is not set.")

          args = [
              sys.executable,
              "-u",
              "-m",
              "tradingagents.scheduled",
              "--config",
              config_path,
              "--run-mode",
              "full",
              "--site-dir",
              site_dir,
              "--label",
              "github-actions-kr",
          ]

          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]
          else:
              print("TRADINGAGENTS_ARCHIVE_DIR is not set. Run history will live under the repository checkout unless the config overrides it.")

          manual_tickers = "${{ github.event.inputs.tickers }}".strip()
          if manual_tickers:
              args += ["--tickers", manual_tickers]

          ticker_universe_mode = "${{ github.event.inputs.ticker_universe_mode }}".strip()
          if ticker_universe_mode:
              args += ["--ticker-universe-mode", ticker_universe_mode]

          manual_trade_date = "${{ github.event.inputs.trade_date }}".strip()
          if manual_trade_date:
              args += ["--trade-date", manual_trade_date]

          site_only = "${{ github.event.inputs.site_only }}".strip().lower()
          if site_only == "true":
              args += ["--site-only"]

          analysis_mode = "${{ github.event.inputs.analysis_mode }}".strip() or "full"
          args += ["--analysis-mode", analysis_mode]

          max_parallel_tickers = "${{ github.event.inputs.max_parallel_tickers }}".strip()
          if max_parallel_tickers:
              args += ["--max-parallel-tickers", max_parallel_tickers]

          per_ticker_timeout_minutes = "${{ github.event.inputs.per_ticker_timeout_minutes }}".strip()
          if per_ticker_timeout_minutes:
              args += ["--per-ticker-timeout-minutes", per_ticker_timeout_minutes]

          daily_active_ticker_limit = "${{ github.event.inputs.daily_active_ticker_limit }}".strip()
          if analysis_mode == "smoke" and not daily_active_ticker_limit:
              daily_active_ticker_limit = "3"
          if daily_active_ticker_limit:
              args += ["--daily-active-ticker-limit", daily_active_ticker_limit]

          subprocess.check_call(args)

      - name: Collect private account artifacts
        if: ${{ !cancelled() }}
        run: |
          import os
          import shutil
          from pathlib import Path

          archive_root = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if not archive_root:
              archive_root = str(Path(os.environ["GITHUB_WORKSPACE"]) / ".runtime" / "tradingagents-archive")

          destination = Path(os.environ["GITHUB_WORKSPACE"]) / "portfolio-artifacts"
          destination.mkdir(parents=True, exist_ok=True)

          archive_path = Path(archive_root)
          if not archive_path.exists():
              raise SystemExit(0)

          for private_dir in archive_path.rglob("portfolio-private"):
              if not private_dir.is_dir():
                  continue
              run_id = private_dir.parent.name
              target = destination / run_id
              target.mkdir(parents=True, exist_ok=True)
              for item in private_dir.iterdir():
                  item_target = target / item.name
                  if item.is_dir():
                      shutil.copytree(item, item_target, dirs_exist_ok=True)
                  elif item.is_file():
                      shutil.copy2(item, item_target)

      - name: Upload private account artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: kr-portfolio-private-${{ github.run_id }}
          path: portfolio-artifacts
          if-no-files-found: warn

      - name: Clean Codex runtime workspace
        if: ${{ always() }}
        run: |
          import os
          import shutil
          from pathlib import Path

          def is_within(child, parent):
              child_path = os.path.normcase(os.path.abspath(child))
              parent_path = os.path.normcase(os.path.abspath(parent))
              return os.path.commonpath([child_path, parent_path]) == parent_path

          def remove_codex_log_files(root):
              if not root:
                  return
              root_path = Path(root)
              if not root_path.exists():
                  return
              for candidate in root_path.glob("logs_*.sqlite*"):
                  if candidate.is_file():
                      try:
                          candidate.unlink()
                      except OSError as exc:
                          print(f"::warning::Could not remove {candidate}: {exc}")

          workspace = os.environ.get("TRADINGAGENTS_CODEX_WORKSPACE_DIR", "").strip()
          runner_temp = os.environ.get("RUNNER_TEMP", "").strip()
          if workspace and runner_temp and is_within(workspace, runner_temp) and Path(workspace).exists():
              shutil.rmtree(workspace, ignore_errors=True)

          legacy_codex_home = Path(os.environ.get("USERPROFILE", "")) / ".codex" / "tradingagents-workspace" / ".codex-home"
          remove_codex_log_files(legacy_codex_home)

  build_pages:
    needs:
      - schedule_gate
      - analyze_us
      - analyze_kr
    if: ${{ always() && github.ref == 'refs/heads/main' && needs.schedule_gate.outputs.should_run == 'true' && !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') && ((needs.schedule_gate.outputs.profile == 'all' && needs.analyze_us.result == 'success' && needs.analyze_kr.result == 'success') || (needs.schedule_gate.outputs.profile == 'us' && needs.analyze_us.result == 'success') || (needs.schedule_gate.outputs.profile == 'kr' && needs.analyze_kr.result == 'success')) }}
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        shell: python {0}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install TradingAgents for site rebuild
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", "."])

      - name: Rebuild final GitHub Pages site from archive
        run: |
          import os
          import subprocess
          import sys

          profile = "${{ needs.schedule_gate.outputs.profile }}".strip()
          config_path = "config/scheduled_analysis.toml"
          if profile == "kr":
              config_path = "config/scheduled_analysis_korea.toml"

          args = [
              sys.executable,
              "-u",
              "-m",
              "tradingagents.scheduled",
              "--config",
              config_path,
              "--site-only",
              "--site-dir",
              os.environ["TRADINGAGENTS_SITE_DIR"],
          ]
          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]
          subprocess.check_call(args)

      - name: Add Git Bash to PATH for Pages packaging
        run: |
          import os
          from pathlib import Path

          for candidate in (Path("C:/Program Files/Git/bin"), Path("C:/Program Files/Git/usr/bin")):
              if (candidate / "bash.exe").exists():
                  with open(os.environ["GITHUB_PATH"], "a", encoding="utf-8") as handle:
                      handle.write(f"{candidate}\n")
                  print(f"Added Git Bash path: {candidate}")
                  raise SystemExit(0)

          raise SystemExit("bash.exe was not found under the expected Git for Windows directories.")

      - name: Upload final GitHub Pages artifact
        id: upload_pages_final
        timeout-minutes: 15
        continue-on-error: true
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-final
          path: site

      - name: Retry final GitHub Pages artifact upload after transient network failure
        if: ${{ steps.upload_pages_final.outcome == 'failure' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-final
          path: site

  deploy:
    needs:
      - build_pages
    if: ${{ always() && needs.build_pages.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-final
