name: Daily Codex Analysis

on:
  schedule:
    # 10:00 KST weekdays (01:00 UTC) -> KR analysis
    - cron: '0 1 * * 1-5'
    # 23:00 KST weekdays (14:00 UTC) -> US analysis
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      profile:
        description: "Run profile: us / kr / all (default all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - us
          - kr
      tickers:
        description: "Optional comma-separated tickers override"
        required: false
        type: string
      ticker_universe_mode:
        description: "Ticker source mode: config_only / config_plus_account / account_only"
        required: false
        default: "config_only"
        type: choice
        options:
          - config_only
          - config_plus_account
          - account_only
      trade_date:
        description: "Optional YYYY-MM-DD trade date override"
        required: false
        type: string
      site_only:
        description: "Only rebuild GitHub Pages from archived runs"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-codex-analysis
  cancel-in-progress: false

jobs:
  analyze_us:
    needs:
      - analyze_kr
      - deploy_kr
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'all' || github.event.inputs.profile == 'us')) || (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 1-5')) && needs.analyze_kr.result != 'failure' && needs.analyze_kr.result != 'cancelled' && needs.deploy_kr.result != 'failure' && needs.deploy_kr.result != 'cancelled' }}
    runs-on: [self-hosted, Windows]
    timeout-minutes: 240
    defaults:
      run:
        shell: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      TRADINGAGENTS_TRANSLATION_MODEL_PATH: ${{ vars.TRADINGAGENTS_TRANSLATION_MODEL_PATH }}
      TRADINGAGENTS_TRANSLATION_TOKENIZER_PATH: ${{ vars.TRADINGAGENTS_TRANSLATION_TOKENIZER_PATH }}
      TRADINGAGENTS_TRANSLATION_DEVICE: ${{ vars.TRADINGAGENTS_TRANSLATION_DEVICE }}
      TRADINGAGENTS_ALLOW_LARGE_TRANSLATION_MODEL: ${{ vars.TRADINGAGENTS_ALLOW_LARGE_TRANSLATION_MODEL }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        run: |
          python -m pip install --upgrade pip
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          python -m pip install -e ".[translation]"
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Materialize runtime API keys
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          $runtimePath = Join-Path $env:RUNNER_TEMP "tradingagents-api-keys.json"
          $payload = [ordered]@{}
          $aliasGroups = [ordered]@{
            "ALPHA_VANTAGE_API_KEY" = @("ALPHA_VANTAGE_API_KEY")
            "NAVER_CLIENT_ID" = @("NAVER_CLIENT_ID")
            "NAVER_CLIENT_SECRET" = @("NAVER_CLIENT_SECRET")
            "OPENDART_API_KEY" = @("OPENDART_API_KEY")
            "KIS_APP_KEY" = @("KIS_APP_KEY", "KIS_Developers_APP_KEY")
            "KIS_APP_SECRET" = @("KIS_APP_SECRET", "KIS_Developers_APP_SECRET")
            "KIS_ACCOUNT_NO" = @("KIS_ACCOUNT_NO", "KIS_Developers_ACCOUNT_NO")
            "KIS_PRODUCT_CODE" = @("KIS_PRODUCT_CODE", "KIS_Developers_PRODUCT_CODE")
          }

          foreach ($canonicalName in $aliasGroups.Keys) {
            foreach ($candidate in $aliasGroups[$canonicalName]) {
              $value = [Environment]::GetEnvironmentVariable($candidate)
              if (-not [string]::IsNullOrWhiteSpace($value)) {
                $payload[$canonicalName] = $value
                $payload[$candidate] = $value
                break
              }
            }
          }

          if ($payload.Count -eq 0) {
            Write-Warning "No GitHub Actions secrets were available for TradingAgents API keys. Runtime will rely on fallback discovery only."
            exit 0
          }

          $payload | ConvertTo-Json | Set-Content -Path $runtimePath -Encoding UTF8
          Add-Content -Path $env:GITHUB_ENV -Value "TRADINGAGENTS_API_KEYS_PATH=$runtimePath"
          Write-Host "Materialized TradingAgents API keys for runtime use."

      - name: Resolve Codex runtime
        run: |
          $siteOnly = "${{ github.event.inputs.site_only }}"
          if ($siteOnly -eq "true") {
            Write-Host "Skipping Codex runtime resolution because site_only=true."
            exit 0
          }
          function Test-CodexCandidate {
            param([string]$Candidate)

            if ([string]::IsNullOrWhiteSpace($Candidate) -or -not (Test-Path $Candidate)) {
              return $false
            }

            try {
              & $Candidate --version | Out-Null
              return ($LASTEXITCODE -eq 0)
            } catch {
              Write-Warning "Codex candidate failed: $Candidate :: $($_.Exception.Message)"
              return $false
            }
          }

          $candidates = [System.Collections.Generic.List[string]]::new()

          if (-not [string]::IsNullOrWhiteSpace($env:CODEX_BINARY)) {
            $candidates.Add($env:CODEX_BINARY)
          }

          $candidates.Add((Join-Path $env:USERPROFILE ".codex\.sandbox-bin\codex.exe"))

          Get-ChildItem -Path "C:\Users\*\.codex\.sandbox-bin\codex.exe" -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            ForEach-Object { $candidates.Add($_.FullName) }

          Get-ChildItem -Path "C:\Users\*\.vscode\extensions\openai.chatgpt-*\bin\windows-x86_64\codex.exe" -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            ForEach-Object { $candidates.Add($_.FullName) }

          $resolvedBinary = $null
          foreach ($candidate in $candidates) {
            if (Test-CodexCandidate $candidate) {
              $resolvedBinary = $candidate
              break
            }
          }

          if (-not $resolvedBinary) {
            throw "Could not find a usable Codex binary. Set the CODEX_BINARY repository variable or install Codex for the runner service account."
          }

          Add-Content -Path $env:GITHUB_ENV -Value "CODEX_BINARY=$resolvedBinary"
          Write-Host "Resolved Codex binary: $resolvedBinary"

          $resolvedHome = $env:CODEX_HOME
          if ([string]::IsNullOrWhiteSpace($resolvedHome) -and $resolvedBinary -like "*.codex\.sandbox-bin\codex.exe") {
            $resolvedHome = Split-Path (Split-Path $resolvedBinary -Parent) -Parent
          }

          if (-not [string]::IsNullOrWhiteSpace($resolvedHome)) {
            Add-Content -Path $env:GITHUB_ENV -Value "CODEX_HOME=$resolvedHome"
            Write-Host "Using CODEX_HOME: $resolvedHome"
          }

      - name: Verify Codex login and model availability
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          $siteOnly = "${{ github.event.inputs.site_only }}"
          if ($siteOnly -eq "true") {
            Write-Host "Skipping Codex preflight because site_only=true."
            exit 0
          }

          $workspaceDir = Join-Path $env:GITHUB_WORKSPACE ".codex-preflight"
          $script = @"
          import os
          from tradingagents.llm_clients.codex_app_server import CodexAppServerAuthError, CodexAppServerBinaryError
          from tradingagents.llm_clients.codex_preflight import run_codex_preflight

          workspace_dir = r"$workspaceDir"
          summary_path = os.getenv("GITHUB_STEP_SUMMARY")

          def write_summary(lines):
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")

          try:
              result = run_codex_preflight(
                  codex_binary=None,
                  model="gpt-5.4",
                  request_timeout=30.0,
                  workspace_dir=workspace_dir,
                  cleanup_threads=True,
              )
          except CodexAppServerAuthError as exc:
              message = (
                  "Codex is installed but not logged in for the runner. "
                  "Run `codex login` or `codex login --device-auth` on the runner machine, "
                  "then retry the workflow."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex login required",
                      "",
                      message,
                  ]
              )
              raise SystemExit(1)
          except CodexAppServerBinaryError as exc:
              message = (
                  "A usable Codex binary is not available for the runner. "
                  "Check the `CODEX_BINARY` repository variable or install Codex for the runner service account."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex runtime issue",
                      "",
                      message,
                      "",
                      str(exc),
                  ]
              )
              raise SystemExit(1)

          print("Codex account:", result.account)
          print("First available models:", ", ".join(result.models[:8]))
          write_summary(
              [
                  "## Codex preflight passed",
                  "",
                  f"- Account: {result.account}",
                  f"- Models: {', '.join(result.models[:8])}",
                  f"- Binary: {os.getenv('CODEX_BINARY', '(auto)')}",
              ]
          )
          "@
          $script | python -
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Run scheduled analysis and build site
        run: |
          $configPath = "config/scheduled_analysis.toml"
          if (-not (Test-Path $configPath)) {
            throw "Missing config/scheduled_analysis.toml. Copy config/scheduled_analysis.example.toml, set your real tickers, and commit the file before enabling the schedule."
          }

          $args = @("-m", "tradingagents.scheduled", "--config", $configPath, "--run-mode", "full", "--site-dir", $env:TRADINGAGENTS_SITE_DIR, "--label", "github-actions-us")

          if (-not [string]::IsNullOrWhiteSpace($env:TRADINGAGENTS_ARCHIVE_DIR)) {
            $args += @("--archive-dir", $env:TRADINGAGENTS_ARCHIVE_DIR)
          } else {
            Write-Warning "TRADINGAGENTS_ARCHIVE_DIR is not set. Run history will live under the repository checkout unless the config overrides it."
          }

          $manualTickers = "${{ github.event.inputs.tickers }}"
          if (-not [string]::IsNullOrWhiteSpace($manualTickers)) {
            $args += @("--tickers", $manualTickers)
          }

          $tickerUniverseMode = "${{ github.event.inputs.ticker_universe_mode }}"
          if (-not [string]::IsNullOrWhiteSpace($tickerUniverseMode)) {
            $args += @("--ticker-universe-mode", $tickerUniverseMode)
          }

          $manualTradeDate = "${{ github.event.inputs.trade_date }}"
          if (-not [string]::IsNullOrWhiteSpace($manualTradeDate)) {
            $args += @("--trade-date", $manualTradeDate)
          }

          $siteOnly = "${{ github.event.inputs.site_only }}"
          if ($siteOnly -eq "true") {
            $args += "--site-only"
          }

          python @args
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Add Git Bash to PATH for Pages packaging
        run: |
          $gitBinCandidates = @(
            "C:\Program Files\Git\bin",
            "C:\Program Files\Git\usr\bin"
          )

          foreach ($candidate in $gitBinCandidates) {
            if (Test-Path (Join-Path $candidate "bash.exe")) {
              Add-Content -Path $env:GITHUB_PATH -Value $candidate
              Write-Host "Added Git Bash path: $candidate"
              exit 0
            }
          }

          throw "bash.exe was not found under the expected Git for Windows directories."

      - name: Upload GitHub Pages artifact
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'all' || github.event.inputs.profile == 'us')) || (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 1-5') }}
        # Self-hosted runners can intermittently lose DNS resolution to GitHub's
        # artifact service endpoints, which surfaces as ENOTFOUND from
        # actions/upload-artifact. Preflight + retry reduces flaky failures.
        id: upload_pages_us
        timeout-minutes: 15
        continue-on-error: true
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-us
          path: site

      - name: Retry GitHub Pages artifact upload after transient network failure (US)
        if: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'all' || github.event.inputs.profile == 'us')) || (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 1-5')) && steps.upload_pages_us.outcome == 'failure' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-us
          path: site

  analyze_kr:
    if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'all' || github.event.inputs.profile == 'kr')) || (github.event_name == 'schedule' && github.event.schedule == '30 0 * * 1-5') }}
    runs-on: [self-hosted, Windows]
    timeout-minutes: 240
    defaults:
      run:
        shell: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      TRADINGAGENTS_TRANSLATION_MODEL_PATH: ${{ vars.TRADINGAGENTS_TRANSLATION_MODEL_PATH }}
      TRADINGAGENTS_TRANSLATION_TOKENIZER_PATH: ${{ vars.TRADINGAGENTS_TRANSLATION_TOKENIZER_PATH }}
      TRADINGAGENTS_TRANSLATION_DEVICE: ${{ vars.TRADINGAGENTS_TRANSLATION_DEVICE }}
      TRADINGAGENTS_ALLOW_LARGE_TRANSLATION_MODEL: ${{ vars.TRADINGAGENTS_ALLOW_LARGE_TRANSLATION_MODEL }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_PRODUCT_CODE: ${{ secrets.KIS_PRODUCT_CODE }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        run: |
          python -m pip install --upgrade pip
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          python -m pip install -e ".[translation]"
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Materialize runtime API keys
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          $runtimePath = Join-Path $env:RUNNER_TEMP "tradingagents-api-keys.json"
          $payload = [ordered]@{}
          $aliasGroups = [ordered]@{
            "ALPHA_VANTAGE_API_KEY" = @("ALPHA_VANTAGE_API_KEY")
            "NAVER_CLIENT_ID" = @("NAVER_CLIENT_ID")
            "NAVER_CLIENT_SECRET" = @("NAVER_CLIENT_SECRET")
            "OPENDART_API_KEY" = @("OPENDART_API_KEY")
            "KIS_APP_KEY" = @("KIS_APP_KEY", "KIS_Developers_APP_KEY")
            "KIS_APP_SECRET" = @("KIS_APP_SECRET", "KIS_Developers_APP_SECRET")
            "KIS_ACCOUNT_NO" = @("KIS_ACCOUNT_NO", "KIS_Developers_ACCOUNT_NO")
            "KIS_PRODUCT_CODE" = @("KIS_PRODUCT_CODE", "KIS_Developers_PRODUCT_CODE")
          }

          foreach ($canonicalName in $aliasGroups.Keys) {
            foreach ($candidate in $aliasGroups[$canonicalName]) {
              $value = [Environment]::GetEnvironmentVariable($candidate)
              if (-not [string]::IsNullOrWhiteSpace($value)) {
                $payload[$canonicalName] = $value
                $payload[$candidate] = $value
                break
              }
            }
          }

          if ($payload.Count -eq 0) {
            Write-Warning "No GitHub Actions secrets were available for TradingAgents API keys. Runtime will rely on fallback discovery only."
            exit 0
          }

          $payload | ConvertTo-Json | Set-Content -Path $runtimePath -Encoding UTF8
          Add-Content -Path $env:GITHUB_ENV -Value "TRADINGAGENTS_API_KEYS_PATH=$runtimePath"
          Write-Host "Materialized TradingAgents API keys for runtime use."

      - name: Report KR vendor credential status
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          $script = @"
          import os
          from tradingagents.dataflows.naver_news import validate_naver_credentials
          from tradingagents.dataflows.opendart import validate_opendart_credentials
          from tradingagents.dataflows.vendor_exceptions import VendorConfigurationError, VendorTransientError

          checks = (
              ("Naver News", validate_naver_credentials),
              ("OpenDART", validate_opendart_credentials),
          )

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          summary_lines = [
              "## KR vendor credential status",
              "",
          ]
          failures = []
          for label, validator in checks:
              try:
                  validator()
                  print(f"{label}: OK")
                  summary_lines.append(f"- {label}: OK")
              except (VendorConfigurationError, VendorTransientError) as exc:
                  message = f"{label}: {exc}"
                  failures.append(message)
                  print(f"::warning::{message}")
                  summary_lines.append(f"- {label}: warning - {exc}")

          if failures:
              print("KR vendor preflight completed with warnings. Analysis will continue using fallback routing where possible.")
              summary_lines.extend(
                  [
                      "",
                      "Analysis will continue, but KR data coverage may degrade until the missing vendors are restored.",
                  ]
              )
          else:
              print("KR vendor preflight passed.")

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\\n".join(summary_lines) + "\\n")
          "@
          $script | python -
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Resolve Codex runtime
        run: |
          $siteOnly = "${{ github.event.inputs.site_only }}"
          if ($siteOnly -eq "true") {
            Write-Host "Skipping Codex runtime resolution because site_only=true."
            exit 0
          }
          function Test-CodexCandidate {
            param([string]$Candidate)

            if ([string]::IsNullOrWhiteSpace($Candidate) -or -not (Test-Path $Candidate)) {
              return $false
            }

            try {
              & $Candidate --version | Out-Null
              return ($LASTEXITCODE -eq 0)
            } catch {
              Write-Warning "Codex candidate failed: $Candidate :: $($_.Exception.Message)"
              return $false
            }
          }

          $candidates = [System.Collections.Generic.List[string]]::new()

          if (-not [string]::IsNullOrWhiteSpace($env:CODEX_BINARY)) {
            $candidates.Add($env:CODEX_BINARY)
          }

          $candidates.Add((Join-Path $env:USERPROFILE ".codex\\.sandbox-bin\\codex.exe"))

          Get-ChildItem -Path "C:\Users\*\\.codex\\.sandbox-bin\\codex.exe" -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            ForEach-Object { $candidates.Add($_.FullName) }

          Get-ChildItem -Path "C:\Users\*\\.vscode\\extensions\\openai.chatgpt-*\\bin\\windows-x86_64\\codex.exe" -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            ForEach-Object { $candidates.Add($_.FullName) }

          $resolvedBinary = $null
          foreach ($candidate in $candidates) {
            if (Test-CodexCandidate $candidate) {
              $resolvedBinary = $candidate
              break
            }
          }

          if (-not $resolvedBinary) {
            throw "Could not find a usable Codex binary. Set the CODEX_BINARY repository variable or install Codex for the runner service account."
          }

          Add-Content -Path $env:GITHUB_ENV -Value "CODEX_BINARY=$resolvedBinary"
          Write-Host "Resolved Codex binary: $resolvedBinary"

          $resolvedHome = $env:CODEX_HOME
          if ([string]::IsNullOrWhiteSpace($resolvedHome) -and $resolvedBinary -like "*.codex\\.sandbox-bin\\codex.exe") {
            $resolvedHome = Split-Path (Split-Path $resolvedBinary -Parent) -Parent
          }

          if (-not [string]::IsNullOrWhiteSpace($resolvedHome)) {
            Add-Content -Path $env:GITHUB_ENV -Value "CODEX_HOME=$resolvedHome"
            Write-Host "Using CODEX_HOME: $resolvedHome"
          }

      - name: Verify Codex login and model availability
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          $siteOnly = "${{ github.event.inputs.site_only }}"
          if ($siteOnly -eq "true") {
            Write-Host "Skipping Codex preflight because site_only=true."
            exit 0
          }

          $workspaceDir = Join-Path $env:GITHUB_WORKSPACE ".codex-preflight"
          $script = @"
          import os
          from tradingagents.llm_clients.codex_app_server import CodexAppServerAuthError, CodexAppServerBinaryError
          from tradingagents.llm_clients.codex_preflight import run_codex_preflight

          workspace_dir = r"$workspaceDir"
          summary_path = os.getenv("GITHUB_STEP_SUMMARY")

          def write_summary(lines):
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")

          try:
              result = run_codex_preflight(
                  codex_binary=None,
                  model="gpt-5.4",
                  request_timeout=30.0,
                  workspace_dir=workspace_dir,
                  cleanup_threads=True,
              )
          except CodexAppServerAuthError as exc:
              message = (
                  "Codex is installed but not logged in for the runner. "
                  "Run `codex login` or `codex login --device-auth` on the runner machine, "
                  "then retry the workflow."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex login required",
                      "",
                      message,
                  ]
              )
              raise SystemExit(1)
          except CodexAppServerBinaryError as exc:
              message = (
                  "A usable Codex binary is not available for the runner. "
                  "Check the `CODEX_BINARY` repository variable or install Codex for the runner service account."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(
                  [
                      "## Codex runtime issue",
                      "",
                      message,
                      "",
                      str(exc),
                  ]
              )
              raise SystemExit(1)

          print("Codex account:", result.account)
          print("First available models:", ", ".join(result.models[:8]))
          write_summary(
              [
                  "## Codex preflight passed",
                  "",
                  f"- Account: {result.account}",
                  f"- Models: {', '.join(result.models[:8])}",
                  f"- Binary: {os.getenv('CODEX_BINARY', '(auto)')}",
              ]
          )
          "@
          $script | python -
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Validate KIS credentials for account report
        if: ${{ github.event.inputs.site_only != 'true' }}
        run: |
          $script = @"
          from tradingagents.dataflows.api_keys import get_api_key
          from tradingagents.portfolio.kis import KisClient

          app_key = get_api_key("KIS_APP_KEY")
          app_secret = get_api_key("KIS_APP_SECRET")
          if not app_key or not app_secret:
              print("::warning::KIS credentials are not configured. The account portfolio report will be skipped until KIS_APP_KEY/KIS_APP_SECRET are available.")
              raise SystemExit(0)

          try:
              client = KisClient.from_api_keys()
              token = client.issue_access_token()
              print("KIS auth preflight:", {"environment": client.environment, "token_issued": bool(token)})
          except Exception as exc:
              print(f"::warning::KIS auth preflight failed: {exc}. KR analysis will continue, but the account portfolio report may be skipped.")
              raise SystemExit(0)

          account_no = get_api_key("KIS_ACCOUNT_NO")
          product_code = get_api_key("KIS_PRODUCT_CODE") or "01"
          if not account_no:
              print("::warning::KIS account number is not configured. Broker auth works, but live account snapshot will skip/fallback until KIS_ACCOUNT_NO is set.")
              raise SystemExit(0)

          try:
              positions, summary = client.fetch_balance(
                  account_no=account_no,
                  product_code=product_code,
              )
          except Exception as exc:
              print(f"::warning::KIS account snapshot preflight failed: {exc}. KR analysis will continue, but the account portfolio report may be skipped.")
              raise SystemExit(0)

          account_result = {
              "environment": client.environment,
              "token_issued": bool(token),
              "positions_count": len(positions),
              "summary_fields": sorted((summary or {}).keys()),
          }
          print("KIS account snapshot preflight:", account_result)
          "@
          $script | python -
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Run scheduled analysis and build site
        run: |
          $configPath = "config/scheduled_analysis_korea.toml"
          if (-not (Test-Path $configPath)) {
            throw "Missing config/scheduled_analysis_korea.toml. Add the file before enabling the KR schedule."
          }

          $args = @("-m", "tradingagents.scheduled", "--config", $configPath, "--run-mode", "full", "--site-dir", $env:TRADINGAGENTS_SITE_DIR, "--label", "github-actions-kr")

          if (-not [string]::IsNullOrWhiteSpace($env:TRADINGAGENTS_ARCHIVE_DIR)) {
            $args += @("--archive-dir", $env:TRADINGAGENTS_ARCHIVE_DIR)
          } else {
            Write-Warning "TRADINGAGENTS_ARCHIVE_DIR is not set. Run history will live under the repository checkout unless the config overrides it."
          }

          $manualTickers = "${{ github.event.inputs.tickers }}"
          if (-not [string]::IsNullOrWhiteSpace($manualTickers)) {
            $args += @("--tickers", $manualTickers)
          }

          $tickerUniverseMode = "${{ github.event.inputs.ticker_universe_mode }}"
          if (-not [string]::IsNullOrWhiteSpace($tickerUniverseMode)) {
            $args += @("--ticker-universe-mode", $tickerUniverseMode)
          }

          $manualTradeDate = "${{ github.event.inputs.trade_date }}"
          if (-not [string]::IsNullOrWhiteSpace($manualTradeDate)) {
            $args += @("--trade-date", $manualTradeDate)
          }

          $siteOnly = "${{ github.event.inputs.site_only }}"
          if ($siteOnly -eq "true") {
            $args += "--site-only"
          }

          python @args
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Collect private account artifacts
        if: ${{ always() }}
        run: |
          $archiveRoot = $env:TRADINGAGENTS_ARCHIVE_DIR
          if ([string]::IsNullOrWhiteSpace($archiveRoot)) {
            $archiveRoot = Join-Path $env:GITHUB_WORKSPACE ".runtime\tradingagents-archive"
          }

          $destination = Join-Path $env:GITHUB_WORKSPACE "portfolio-artifacts"
          New-Item -ItemType Directory -Force -Path $destination | Out-Null

          Get-ChildItem -Path $archiveRoot -Recurse -Directory -Filter "portfolio-private" -ErrorAction SilentlyContinue |
            ForEach-Object {
              $runId = Split-Path $_.Parent -Leaf
              $target = Join-Path $destination $runId
              New-Item -ItemType Directory -Force -Path $target | Out-Null
              Copy-Item -Path (Join-Path $_.FullName "*") -Destination $target -Recurse -Force -ErrorAction SilentlyContinue
            }

      - name: Add Git Bash to PATH for Pages packaging
        run: |
          $gitBinCandidates = @(
            "C:\Program Files\Git\bin",
            "C:\Program Files\Git\usr\bin"
          )

          foreach ($candidate in $gitBinCandidates) {
            if (Test-Path (Join-Path $candidate "bash.exe")) {
              Add-Content -Path $env:GITHUB_PATH -Value $candidate
              Write-Host "Added Git Bash path: $candidate"
              exit 0
            }
          }

          throw "bash.exe was not found under the expected Git for Windows directories."

      - name: Upload GitHub Pages artifact
        # NOTE:
        # upload-pages-artifact defaults to artifact name "github-pages".
        # We use explicit region-specific artifact names to avoid 409 conflicts
        # and to support two deployments during profile=all runs.
        # Use a KR-specific artifact name so all-mode can run an intermediate deploy
        # before US analysis without artifact naming collisions.
        if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'kr' || github.event.inputs.profile == 'all')) || (github.event_name == 'schedule' && github.event.schedule == '30 0 * * 1-5') }}
        id: upload_pages_kr
        timeout-minutes: 15
        continue-on-error: true
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-kr
          path: site

      - name: Retry GitHub Pages artifact upload after transient network failure (KR)
        if: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'kr' || github.event.inputs.profile == 'all')) || (github.event_name == 'schedule' && github.event.schedule == '30 0 * * 1-5')) && steps.upload_pages_kr.outcome == 'failure' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-kr
          path: site

      - name: Upload private account artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: kr-portfolio-private-${{ github.run_id }}
          path: portfolio-artifacts
          if-no-files-found: warn

  deploy_kr:
    needs:
      - analyze_kr
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'all' && needs.analyze_kr.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy KR snapshot to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-kr

  deploy:
    needs:
      - analyze_us
      - analyze_kr
      - deploy_kr
    if: ${{ always() && !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') && ((github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'all' && needs.analyze_us.result == 'success' && needs.deploy_kr.result == 'success') || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'us' && needs.analyze_us.result == 'success') || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'kr' && needs.analyze_kr.result == 'success') || (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 1-5' && needs.analyze_us.result == 'success') || (github.event_name == 'schedule' && github.event.schedule == '30 0 * * 1-5' && needs.analyze_kr.result == 'success')) }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: ${{ (needs.analyze_us.result == 'success' && 'github-pages-us') || 'github-pages-kr' }}
