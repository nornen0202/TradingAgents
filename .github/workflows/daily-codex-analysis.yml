          "@
          $script | python -
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Run scheduled analysis and build site
        run: |
          $configPath = "config/scheduled_analysis_korea.toml"
          if (-not (Test-Path $configPath)) {
            throw "Missing config/scheduled_analysis_korea.toml. Add the file before enabling the KR schedule."
          }

          $args = @("-m", "tradingagents.scheduled", "--config", $configPath, "--site-dir", $env:TRADINGAGENTS_SITE_DIR, "--label", "github-actions-kr")

          if (-not [string]::IsNullOrWhiteSpace($env:TRADINGAGENTS_ARCHIVE_DIR)) {
