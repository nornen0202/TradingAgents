              Add-Content -Path $env:GITHUB_PATH -Value $candidate
              Write-Host "Added Git Bash path: $candidate"
              exit 0
            }
          }

          throw "bash.exe was not found under the expected Git for Windows directories."

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: [analyze_us, analyze_kr]
    if: ${{ always() && (needs.analyze_us.result == 'success' || needs.analyze_kr.result == 'success') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
