name: Intraday Overlay Refresh

on:
  schedule:
    # KR overlay starts: 10:05, 12:00, 13:20 KST.
    # Target deploys are roughly 11:05, 13:00, and before 14:30 KST.
    - cron: '5 1 * * 1-5'
    - cron: '0 3 * * 1-5'
    - cron: '20 4 * * 1-5'
    # US overlay starts: 22:40, 00:40, 02:10 KST for the active US session.
    # Target deploys are roughly 23:30, 01:30, and by 03:00 KST.
    - cron: '40 13,15 * * 1-5'
    - cron: '10 17 * * 1-5'
  workflow_dispatch:
    inputs:
      profile:
        description: "Run profile: us / kr / all (default all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - us
          - kr
      run_mode:
        description: "overlay_only / selective_rerun_only"
        required: false
        default: "overlay_only"
        type: choice
        options:
          - overlay_only
          - selective_rerun_only
      tickers:
        description: "Optional comma-separated tickers override"
        required: false
        type: string

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  overlay_gate:
    runs-on: ubuntu-latest
    outputs:
      run_us: ${{ steps.gate.outputs.run_us }}
      run_kr: ${{ steps.gate.outputs.run_kr }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Require a successful research baseline from the last 24 hours
        id: gate
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          REQUESTED_PROFILE: ${{ github.event.inputs.profile }}
        run: python .github/scripts/intraday_overlay_gate.py

  overlay_refresh_us:
    needs:
      - overlay_gate
    if: ${{ needs.overlay_gate.outputs.run_us == 'true' }}
    runs-on: [self-hosted, Windows]
    timeout-minutes: 120
    defaults:
      run:
        shell: python {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      ALPACA_ENDPOINT: ${{ secrets.ALPACA_ENDPOINT }}
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_PRODUCT_CODE: ${{ secrets.KIS_PRODUCT_CODE }}
      KIS_Developers_APP_KEY: ${{ secrets.KIS_Developers_APP_KEY }}
      KIS_Developers_APP_SECRET: ${{ secrets.KIS_Developers_APP_SECRET }}
      KIS_Developers_ACCOUNT_NO: ${{ secrets.KIS_Developers_ACCOUNT_NO }}
      KIS_Developers_PRODUCT_CODE: ${{ secrets.KIS_Developers_PRODUCT_CODE }}
      KIS_HTTP_TIMEOUT_SECONDS: "8"
      TRADINGAGENTS_OVERLAY_MAX_WORKERS: "4"
      TRADINGAGENTS_OVERLAY_TICKER_TIMEOUT_SECONDS: "45"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", ".[translation]"])

      - name: Run overlay refresh mode
        run: |
          import os
          from pathlib import Path
          import subprocess
          import sys

          config_path = "config/scheduled_analysis.toml"
          if not Path(config_path).exists():
              raise SystemExit("Missing config/scheduled_analysis.toml.")

          run_mode = "${{ github.event.inputs.run_mode }}".strip() or "overlay_only"
          args = [
              sys.executable,
              "-m",
              "tradingagents.scheduled",
              "--config",
              config_path,
              "--run-mode",
              run_mode,
              "--site-dir",
              "site",
              "--label",
              "github-actions-overlay-us",
              "--skip-site-build",
          ]

          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]

          manual_tickers = "${{ github.event.inputs.tickers }}".strip()
          if manual_tickers:
              args += ["--tickers", manual_tickers]

          subprocess.check_call(args)

      - name: Validate US decision bundle quality
        run: |
          import os
          import subprocess
          import sys

          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip() or ".runtime/tradingagents-archive"
          subprocess.check_call([
              sys.executable,
              ".github/scripts/verify_decision_bundle.py",
              "--archive-dir",
              archive_dir,
              "--latest",
          ])

  overlay_refresh_kr:
    needs:
      - overlay_gate
    if: ${{ needs.overlay_gate.outputs.run_kr == 'true' }}
    runs-on: [self-hosted, Windows]
    timeout-minutes: 120
    defaults:
      run:
        shell: python {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      ALPACA_ENDPOINT: ${{ secrets.ALPACA_ENDPOINT }}
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_PRODUCT_CODE: ${{ secrets.KIS_PRODUCT_CODE }}
      KIS_Developers_APP_KEY: ${{ secrets.KIS_Developers_APP_KEY }}
      KIS_Developers_APP_SECRET: ${{ secrets.KIS_Developers_APP_SECRET }}
      KIS_Developers_ACCOUNT_NO: ${{ secrets.KIS_Developers_ACCOUNT_NO }}
      KIS_Developers_PRODUCT_CODE: ${{ secrets.KIS_Developers_PRODUCT_CODE }}
      KIS_HTTP_TIMEOUT_SECONDS: "8"
      TRADINGAGENTS_OVERLAY_MAX_WORKERS: "4"
      TRADINGAGENTS_OVERLAY_TICKER_TIMEOUT_SECONDS: "45"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", ".[translation]"])

      - name: Run overlay refresh mode
        run: |
          import os
          from pathlib import Path
          import subprocess
          import sys

          config_path = "config/scheduled_analysis_korea.toml"
          if not Path(config_path).exists():
              raise SystemExit("Missing config/scheduled_analysis_korea.toml.")

          run_mode = "${{ github.event.inputs.run_mode }}".strip() or "overlay_only"
          args = [
              sys.executable,
              "-m",
              "tradingagents.scheduled",
              "--config",
              config_path,
              "--run-mode",
              run_mode,
              "--site-dir",
              "site",
              "--label",
              "github-actions-overlay-kr",
              "--skip-site-build",
          ]

          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]

          manual_tickers = "${{ github.event.inputs.tickers }}".strip()
          if manual_tickers:
              args += ["--tickers", manual_tickers]

          subprocess.check_call(args)

      - name: Validate KR decision bundle quality
        run: |
          import os
          import subprocess
          import sys

          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip() or ".runtime/tradingagents-archive"
          subprocess.check_call([
              sys.executable,
              ".github/scripts/verify_decision_bundle.py",
              "--archive-dir",
              archive_dir,
              "--latest",
          ])

  publish_overlay_site:
    needs:
      - overlay_refresh_us
      - overlay_refresh_kr
    if: ${{ always() && !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') && (needs.overlay_refresh_us.result == 'success' || needs.overlay_refresh_kr.result == 'success') }}
    runs-on: [self-hosted, Windows]
    timeout-minutes: 30
    concurrency:
      group: intraday-overlay-publish
      cancel-in-progress: true
    defaults:
      run:
        shell: python {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", ".[translation]"])

      - name: Rebuild final merged overlay site
        run: |
          import os
          import subprocess
          import sys

          profile = "${{ github.event.inputs.profile }}".strip()
          schedule = "${{ github.event.schedule }}".strip()
          event_name = "${{ github.event_name }}".strip()
          config_path = "config/scheduled_analysis.toml"
          if event_name == "workflow_dispatch" and profile == "kr":
              config_path = "config/scheduled_analysis_korea.toml"
          if event_name == "schedule" and schedule in {"5 1 * * 1-5", "0 3 * * 1-5", "20 4 * * 1-5"}:
              config_path = "config/scheduled_analysis_korea.toml"

          args = [
              sys.executable,
              "-m",
              "tradingagents.scheduled",
              "--config",
              config_path,
              "--site-only",
              "--site-dir",
              "site",
          ]
          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]

          subprocess.check_call(args)

      - name: Add Git Bash to PATH for Pages packaging
        run: |
          import os
          from pathlib import Path

          for candidate in (r"C:\Program Files\Git\bin", r"C:\Program Files\Git\usr\bin"):
              if (Path(candidate) / "bash.exe").exists():
                  github_path = os.environ.get("GITHUB_PATH")
                  if not github_path:
                      raise SystemExit("GITHUB_PATH is unavailable.")
                  with open(github_path, "a", encoding="utf-8") as handle:
                      handle.write(candidate + os.linesep)
                  print(f"Added Git Bash path: {candidate}")
                  break
          else:
              raise SystemExit("bash.exe was not found under the expected Git for Windows directories.")

      - name: Verify final site output directory exists
        run: |
          from pathlib import Path

          if not Path("site").exists():
              raise SystemExit("Expected site output directory 'site' was not created.")

      - name: Verify stable decision bundle Pages paths
        run: |
          import subprocess
          import sys

          profile = "${{ github.event.inputs.profile }}".strip()
          schedule = "${{ github.event.schedule }}".strip()
          markets = ["us", "kr"] if profile in {"", "all"} else [profile]
          if schedule in {"5 1 * * 1-5", "0 3 * * 1-5", "20 4 * * 1-5"}:
              markets = ["kr"]
          elif schedule:
              markets = ["us"]
          for market in markets:
              subprocess.check_call([
                  sys.executable,
                  ".github/scripts/verify_decision_bundle.py",
                  "--site-dir",
                  "site",
                  "--market",
                  market,
              ])

      - name: Upload final GitHub Pages artifact
        id: upload_pages_final
        timeout-minutes: 15
        continue-on-error: true
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-overlay
          path: site

      - name: Retry final GitHub Pages artifact upload after transient network failure
        if: ${{ steps.upload_pages_final.outcome == 'failure' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-overlay
          path: site

  deploy_overlay:
    needs:
      - publish_overlay_site
    if: ${{ always() && needs.publish_overlay_site.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy overlay refresh site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-overlay
