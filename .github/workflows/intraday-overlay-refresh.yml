name: Intraday Overlay Refresh

on:
  schedule:
    # KR checkpoints: 09:05, 11:05, 13:05, 15:25 KST.
    - cron: '5 0,2,4 * * 1-5'
    - cron: '25 6 * * 1-5'
    # US checkpoints: 23:35, 01:35, 03:35, 05:05 KST.
    - cron: '35 14,16,18 * * 1-5'
    - cron: '5 20 * * 1-5'
  workflow_dispatch:
    inputs:
      profile:
        description: "Run profile: us / kr / all (default all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - us
          - kr
      run_mode:
        description: "overlay_only / selective_rerun_only"
        required: false
        default: "overlay_only"
        type: choice
        options:
          - overlay_only
          - selective_rerun_only
      tickers:
        description: "Optional comma-separated tickers override"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  overlay_refresh_us:
    if: ${{ (github.event_name == 'schedule' && (github.event.schedule == '35 14,16,18 * * 1-5' || github.event.schedule == '5 20 * * 1-5')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'all' || github.event.inputs.profile == 'us')) }}
    runs-on: [self-hosted, Windows]
    timeout-minutes: 120
    defaults:
      run:
        shell: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_PRODUCT_CODE: ${{ secrets.KIS_PRODUCT_CODE }}
      KIS_Developers_APP_KEY: ${{ secrets.KIS_Developers_APP_KEY }}
      KIS_Developers_APP_SECRET: ${{ secrets.KIS_Developers_APP_SECRET }}
      KIS_Developers_ACCOUNT_NO: ${{ secrets.KIS_Developers_ACCOUNT_NO }}
      KIS_Developers_PRODUCT_CODE: ${{ secrets.KIS_Developers_PRODUCT_CODE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        run: |
          python -m pip install --upgrade pip
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          python -m pip install -e ".[translation]"
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Run overlay refresh mode
        run: |
          $configPath = "config/scheduled_analysis.toml"
          if (-not (Test-Path $configPath)) {
            throw "Missing config/scheduled_analysis.toml."
          }

          $runMode = "${{ github.event.inputs.run_mode }}"
          if ([string]::IsNullOrWhiteSpace($runMode)) {
            $runMode = "overlay_only"
          }

          $args = @("-m", "tradingagents.scheduled", "--config", $configPath, "--run-mode", $runMode, "--site-dir", "site", "--label", "github-actions-overlay-us")

          if (-not [string]::IsNullOrWhiteSpace($env:TRADINGAGENTS_ARCHIVE_DIR)) {
            $args += @("--archive-dir", $env:TRADINGAGENTS_ARCHIVE_DIR)
          }

          $manualTickers = "${{ github.event.inputs.tickers }}"
          if (-not [string]::IsNullOrWhiteSpace($manualTickers)) {
            $args += @("--tickers", $manualTickers)
          }

          python @args
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Add Git Bash to PATH for Pages packaging
        run: |
          $gitBinCandidates = @(
            "C:\Program Files\Git\bin",
            "C:\Program Files\Git\usr\bin"
          )

          foreach ($candidate in $gitBinCandidates) {
            if (Test-Path (Join-Path $candidate "bash.exe")) {
              Add-Content -Path $env:GITHUB_PATH -Value $candidate
              Write-Host "Added Git Bash path: $candidate"
              exit 0
            }
          }

          throw "bash.exe was not found under the expected Git for Windows directories."

      - name: Verify site output directory exists (US)
        run: |
          if (-not (Test-Path "site")) {
            throw "Expected site output directory 'site' was not created."
          }

      - name: Upload GitHub Pages artifact (US)
        id: upload_pages_us
        timeout-minutes: 15
        continue-on-error: true
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-overlay-us
          path: site

      - name: Retry GitHub Pages artifact upload after transient network failure (US)
        if: ${{ steps.upload_pages_us.outcome == 'failure' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-overlay-us
          path: site

  overlay_refresh_kr:
    if: ${{ (github.event_name == 'schedule' && (github.event.schedule == '5 0,2,4 * * 1-5' || github.event.schedule == '25 6 * * 1-5')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'all' || github.event.inputs.profile == 'kr')) }}
    runs-on: [self-hosted, Windows]
    timeout-minutes: 120
    defaults:
      run:
        shell: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_PRODUCT_CODE: ${{ secrets.KIS_PRODUCT_CODE }}
      KIS_Developers_APP_KEY: ${{ secrets.KIS_Developers_APP_KEY }}
      KIS_Developers_APP_SECRET: ${{ secrets.KIS_Developers_APP_SECRET }}
      KIS_Developers_ACCOUNT_NO: ${{ secrets.KIS_Developers_ACCOUNT_NO }}
      KIS_Developers_PRODUCT_CODE: ${{ secrets.KIS_Developers_PRODUCT_CODE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        run: |
          python -m pip install --upgrade pip
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          python -m pip install -e ".[translation]"
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Run overlay refresh mode
        run: |
          $configPath = "config/scheduled_analysis_korea.toml"
          if (-not (Test-Path $configPath)) {
            throw "Missing config/scheduled_analysis_korea.toml."
          }

          $runMode = "${{ github.event.inputs.run_mode }}"
          if ([string]::IsNullOrWhiteSpace($runMode)) {
            $runMode = "overlay_only"
          }

          $args = @("-m", "tradingagents.scheduled", "--config", $configPath, "--run-mode", $runMode, "--site-dir", "site", "--label", "github-actions-overlay-kr")

          if (-not [string]::IsNullOrWhiteSpace($env:TRADINGAGENTS_ARCHIVE_DIR)) {
            $args += @("--archive-dir", $env:TRADINGAGENTS_ARCHIVE_DIR)
          }

          $manualTickers = "${{ github.event.inputs.tickers }}"
          if (-not [string]::IsNullOrWhiteSpace($manualTickers)) {
            $args += @("--tickers", $manualTickers)
          }

          python @args
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Add Git Bash to PATH for Pages packaging
        run: |
          $gitBinCandidates = @(
            "C:\Program Files\Git\bin",
            "C:\Program Files\Git\usr\bin"
          )

          foreach ($candidate in $gitBinCandidates) {
            if (Test-Path (Join-Path $candidate "bash.exe")) {
              Add-Content -Path $env:GITHUB_PATH -Value $candidate
              Write-Host "Added Git Bash path: $candidate"
              exit 0
            }
          }

          throw "bash.exe was not found under the expected Git for Windows directories."

      - name: Verify site output directory exists (KR)
        run: |
          if (-not (Test-Path "site")) {
            throw "Expected site output directory 'site' was not created."
          }

      - name: Upload GitHub Pages artifact (KR)
        id: upload_pages_kr
        timeout-minutes: 15
        continue-on-error: true
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-overlay-kr
          path: site

      - name: Retry GitHub Pages artifact upload after transient network failure (KR)
        if: ${{ steps.upload_pages_kr.outcome == 'failure' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-overlay-kr
          path: site

  publish_overlay_site:
    needs:
      - overlay_refresh_us
      - overlay_refresh_kr
    if: ${{ always() && !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') && (needs.overlay_refresh_us.result == 'success' || needs.overlay_refresh_kr.result == 'success') }}
    runs-on: [self-hosted, Windows]
    timeout-minutes: 60
    defaults:
      run:
        shell: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        run: |
          python -m pip install --upgrade pip
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          python -m pip install -e ".[translation]"
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Rebuild final merged overlay site
        run: |
          $profile = "${{ github.event.inputs.profile }}"
          $schedule = "${{ github.event.schedule }}"
          $configPath = "config/scheduled_analysis.toml"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and $profile -eq "kr") {
            $configPath = "config/scheduled_analysis_korea.toml"
          }
          if ("${{ github.event_name }}" -eq "schedule" -and ($schedule -eq "5 0,2,4 * * 1-5" -or $schedule -eq "25 6 * * 1-5")) {
            $configPath = "config/scheduled_analysis_korea.toml"
          }

          $args = @("-m", "tradingagents.scheduled", "--config", $configPath, "--site-only", "--site-dir", "site")
          if (-not [string]::IsNullOrWhiteSpace($env:TRADINGAGENTS_ARCHIVE_DIR)) {
            $args += @("--archive-dir", $env:TRADINGAGENTS_ARCHIVE_DIR)
          }

          python @args
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Add Git Bash to PATH for Pages packaging
        run: |
          $gitBinCandidates = @(
            "C:\Program Files\Git\bin",
            "C:\Program Files\Git\usr\bin"
          )

          foreach ($candidate in $gitBinCandidates) {
            if (Test-Path (Join-Path $candidate "bash.exe")) {
              Add-Content -Path $env:GITHUB_PATH -Value $candidate
              Write-Host "Added Git Bash path: $candidate"
              exit 0
            }
          }

          throw "bash.exe was not found under the expected Git for Windows directories."

      - name: Verify final site output directory exists
        run: |
          if (-not (Test-Path "site")) {
            throw "Expected site output directory 'site' was not created."
          }

      - name: Upload final GitHub Pages artifact
        id: upload_pages_final
        timeout-minutes: 15
        continue-on-error: true
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-overlay
          path: site

      - name: Retry final GitHub Pages artifact upload after transient network failure
        if: ${{ steps.upload_pages_final.outcome == 'failure' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-overlay
          path: site

  deploy_overlay:
    needs:
      - publish_overlay_site
    if: ${{ needs.publish_overlay_site.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy overlay refresh site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-overlay
