name: Daily PRISM Telegram Reports

on:
  schedule:
    # After the YouTube add-on window and before the next KR daily run.
    - cron: '35 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "Collection mode: public_preview / bot_api / user_session"
        required: false
        default: "user_session"
        type: choice
        options:
          - public_preview
          - bot_api
          - user_session
      lookback_minutes:
        description: "Lookback window in minutes"
        required: false
        default: "360"
        type: string
      max_messages:
        description: "Maximum Telegram messages to process"
        required: false
        default: "80"
        type: string
      download_pdfs:
        description: "Download PDFs in authenticated modes"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  prepare_self_hosted_runner:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: [self-hosted, Windows]
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Clear stale runner diagnostic logs
        run: |
          $runnerTemp = (Resolve-Path $env:RUNNER_TEMP).Path
          $runnerRoot = Split-Path (Split-Path $runnerTemp -Parent) -Parent
          $diagDirs = @(
            (Join-Path $runnerRoot "_diag\pages"),
            (Join-Path $runnerRoot "_diag\blocks")
          )

          foreach ($diagDir in $diagDirs) {
            if (-not (Test-Path -LiteralPath $diagDir)) {
              Write-Output "Runner diagnostics directory does not exist: $diagDir"
              continue
            }

            $removed = 0
            Get-ChildItem -LiteralPath $diagDir -File -ErrorAction SilentlyContinue | ForEach-Object {
              try {
                Remove-Item -LiteralPath $_.FullName -Force -ErrorAction Stop
                $removed += 1
              } catch {
                Write-Output "::warning::Could not remove $($_.FullName): $($_.Exception.Message)"
              }
            }
            Write-Output "Removed $removed stale runner diagnostic file(s) from $diagDir"
          }

  build_prism_telegram_pages:
    needs: prepare_self_hosted_runner
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: [self-hosted, Windows]
    permissions:
      contents: read
    defaults:
      run:
        shell: python {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TRADINGAGENTS_REPO_DIR: ${{ github.workspace }}\source-${{ github.run_id }}
      TRADINGAGENTS_SITE_DIR: ${{ github.workspace }}\site-${{ github.run_id }}
      TRADINGAGENTS_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_ARCHIVE_DIR }}
      TRADINGAGENTS_PRISM_TELEGRAM_ARCHIVE_DIR: ${{ vars.TRADINGAGENTS_PRISM_TELEGRAM_ARCHIVE_DIR }}
      PRISM_TELEGRAM_PRIVATE_ARCHIVE_DIR: ${{ vars.PRISM_TELEGRAM_PRIVATE_ARCHIVE_DIR }}
      PRISM_TELEGRAM_MODE: ${{ github.event.inputs.mode || vars.PRISM_TELEGRAM_MODE || 'user_session' }}
      PRISM_TELEGRAM_DOWNLOAD_PDFS: ${{ github.event.inputs.download_pdfs || vars.PRISM_TELEGRAM_DOWNLOAD_PDFS || 'true' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
      TELEGRAM_SESSION_PATH: ${{ vars.TELEGRAM_SESSION_PATH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          path: source-${{ github.run_id }}
          clean: false
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install TradingAgents
        working-directory: ${{ env.TRADINGAGENTS_REPO_DIR }}
        run: |
          import subprocess
          import sys

          subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", ".[telegram]"])

      - name: Rebuild base scheduled site
        working-directory: ${{ env.TRADINGAGENTS_REPO_DIR }}
        run: |
          import os
          import subprocess
          import sys

          args = [
              sys.executable,
              "-u",
              "-m",
              "tradingagents.scheduled",
              "--config",
              "config/scheduled_analysis.toml",
              "--site-only",
              "--site-dir",
              os.environ["TRADINGAGENTS_SITE_DIR"],
          ]
          archive_dir = os.environ.get("TRADINGAGENTS_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]
          subprocess.check_call(args)

      - name: Run PRISM Telegram report collection
        timeout-minutes: 45
        working-directory: ${{ env.TRADINGAGENTS_REPO_DIR }}
        run: |
          import os
          import subprocess
          import sys

          lookback_minutes = "${{ github.event.inputs.lookback_minutes }}".strip() or "360"
          max_messages = "${{ github.event.inputs.max_messages }}".strip() or "80"
          mode = os.environ.get("PRISM_TELEGRAM_MODE", "").strip() or "user_session"
          download_pdfs = os.environ.get("PRISM_TELEGRAM_DOWNLOAD_PDFS", "").strip().lower() or "true"

          args = [
              sys.executable,
              "-u",
              "-m",
              "tradingagents.prism_telegram",
              "--config",
              "config/prism_telegram_daily.toml",
              "--mode",
              mode,
              "--lookback-minutes",
              lookback_minutes,
              "--max-messages",
              max_messages,
              "--site-dir",
              os.environ["TRADINGAGENTS_SITE_DIR"],
          ]
          archive_dir = os.environ.get("TRADINGAGENTS_PRISM_TELEGRAM_ARCHIVE_DIR", "").strip()
          if archive_dir:
              args += ["--archive-dir", archive_dir]
          if download_pdfs in {"1", "true", "yes", "on"}:
              args += ["--download-pdfs"]
          subprocess.check_call(args)

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          name: github-pages-prism-telegram
          path: ${{ env.TRADINGAGENTS_SITE_DIR }}

  deploy:
    needs: build_prism_telegram_pages
    if: ${{ needs.build_prism_telegram_pages.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-prism-telegram
          timeout: 1800000
          reporting_interval: 10000
